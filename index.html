const COLS = 11, ROWS = 32;
const colName = i => String.fromCharCode(65+i);
const sheetEl = document.getElementById('sheet');
let cells = [];

(function buildGrid(){
  let html = '<tr><th class="corner"></th>';
  for(let c=0;c<COLS;c++) html += `<th class="colhead">${colName(c)}</th>`;
  html += '</tr>';
  for(let r=1;r<=ROWS;r++){
    html += `<tr><th class="rowhead">${r}</th>`;
    for(let c=0;c<COLS;c++) html += `<td data-r="${r}" data-c="${c}"></td>`;
    html += '</tr>';
  }
  sheetEl.innerHTML = html;
  cells = Array.from({length:ROWS+1},()=>[]);
  sheetEl.querySelectorAll('td').forEach(td=>{
    cells[+td.dataset.r][+td.dataset.c] = td;
    td.addEventListener('click', ()=>{
      document.querySelectorAll('td.selected').forEach(x=>x.classList.remove('selected'));
      td.classList.add('selected');
      document.getElementById('namebox').textContent = colName(+td.dataset.c)+td.dataset.r;
      document.getElementById('fxcontent').textContent = td.textContent;
    });
  });
})();

function clearGrid(){
  sheetEl.querySelectorAll('td').forEach(td=>{ td.textContent=''; td.className=''; td.onclick=null; td.contentEditable='false'; });
}
function setCell(r,c,text,cls,onclick){
  if(r>ROWS||c>=COLS||r<1) return;
  const td = cells[r][c];
  td.textContent = text;
  if(cls) td.className = cls;
  if(onclick){ td.classList.add('choice'); td.onclick = e=>{ e.stopPropagation(); onclick(); }; }
}
function setStatus(t){ document.getElementById('statustext').textContent = t; }
function setFx(t){ document.getElementById('fxcontent').textContent = t; }

  if(att==='야근' && def!=='야근') return 1.3;
  if(def==='야근' && att!=='야근') return 1.3;
  if(TRIANGLE[att]===def) return 1.5;
  if(TRIANGLE[def]===att) return 0.67;

}

/* 개체 희귀도 (종족 legend 플래그와 별개) */
const RARITY = {
  normal:{ mult:1,    catch:1,    pay:1,  prefix:'',      cls:'',       rank:0 },
  gold:  { mult:1.15, catch:0.75, pay:3,  prefix:'황금 ',   cls:'gold',   rank:1 },
  prism: { mult:1.30, catch:0.55, pay:5,  prefix:'프리즘 ',  cls:'prism',  rank:2 },
  legend:{ mult:1.50, catch:0.35, pay:10, prefix:'레전드 ',  cls:'legend', rank:3 },
};
const TRAITS = {
  흡혈:'준 데미지의 25%만큼 HP 회복',
  강철:'받는 데미지 20% 감소',
  집중:'급소율 8% → 20%',
  재생:'자기 턴마다 최대 HP 6% 회복',
};
/* 출현율: 레전드 0.3% / 프리즘 1.5% / 황금 6% */
function rollRarity(){
  const r = Math.random();
  if(r < 0.003) return 'legend';
  if(r < 0.018) return 'prism';
  if(r < 0.078) return 'gold';
  return 'normal';
}
function statsFor(sid, lv, rar){
  const s = SPECIES[sid];
  const mult = RARITY[rar||'normal'].mult;
  return {
    maxhp: Math.round((s.hp + (lv-1)*6) * mult),
    atk: Math.round(s.atk * (1+0.08*(lv-1)) * mult),
  };
}
function makeMon(sid, lv, rar){
  rar = rar||'normal';
  const st = statsFor(sid, lv, rar);
  const m = { sid, lv, rar, maxhp:st.maxhp, hp:st.maxhp, atk:st.atk, exp:0 };
  if(rar==='legend'){
    const keys = Object.keys(TRAITS);
    m.trait = keys[Math.floor(Math.random()*keys.length)];
  }
  return m;
}
function monName(m){ return RARITY[m.rar||'normal'].prefix + SPECIES[m.sid].name; }
function monCls(m){ return RARITY[m.rar||'normal'].cls; }
function monType(m){ return SPECIES[m.sid].type; }
function knownMoves(m){
  return SPECIES[m.sid].moves.filter(mv=>mv[0]<=m.lv).slice(-4);
}
/* 비선형 성장 곡선: 초반은 기존과 비슷, 중후반은 확연히 느리게 (v2.0 밸런싱) */
function expNeed(lv){ return Math.round(lv*16 + lv*lv*1.5); }

const DOPE_MAX = 5;
const DOPE_OUTCOMES = [
  { p:0.10, mult:1.20, msg:'★ 대성공!! 온몸에서 빛이 난다! (능력치 +20%)' },
  { p:0.45, mult:1.10, msg:'성공! 힘이 솟구친다. (능력치 +10%)' },

];
function rollDope(){
  let r = Math.random();
  for(const o of DOPE_OUTCOMES){ if(r < o.p) return o; r -= o.p; }
  return DOPE_OUTCOMES[DOPE_OUTCOMES.length-1];
}
function recalcMonStats(m){
  const st = statsFor(m.sid, m.lv, m.rar);
  const dope = m.dope||1;
  const ratio = m.maxhp>0 ? m.hp/m.maxhp : 1;
  m.maxhp = Math.max(1, Math.round(st.maxhp*dope));
  m.atk = Math.max(1, Math.round(st.atk*dope));
  m.hp = m.hp<=0 ? 0 : Math.max(1, Math.round(m.maxhp*ratio));
}
function applyDope(m, outcome){
  m.dope = +(((m.dope||1) * outcome.mult).toFixed(3));
  m.dopeN = (m.dopeN||0) + 1;
  recalcMonStats(m);
}

const LOCAL_KEY = 'cellquest_save';

async function cloudSave(force){
  if(!hasCloud || !G.name) return;
  const now = Date.now();
  if(!force && now-lastCloudSave<4000) return;
  lastCloudSave = now;
  try{ await window.storage.set('savegame', JSON.stringify(G)); }catch(e){}
}
async function cloudLoadCheck(){
  if(!hasCloud) return;
  try{
    const r = await window.storage.get('savegame');
    if(r && r.value){
      const obj = JSON.parse(r.value);
      if(obj && (obj.v===2||obj.v===3) && Array.isArray(obj.party)) cloudSaveData = migrateSave(obj);
    }
  }catch(e){ /* 저장 데이터 없음 */ }
  if(G.screen==='title' && !bossMode) render();
}
async function updateBoard(force){
  if(!hasCloud || !G.name || G.party.length===0) return;
  const now = Date.now();
  if(!force && now-lastBoardSave<8000) return;
  lastBoardSave = now;
  try{
    await window.storage.set('lb:'+G.name, JSON.stringify({
      name:G.name, wins:G.wins, dex:dexCaughtCount(),
      gold:Object.keys(G.rarDex||{}).length, story:G.isekai?G.story+1:G.story, ts:Date.now()
    }), true);
  }catch(e){}
}

let rankCache = null;
async function loadRank(){
  if(!hasCloud){ rankCache=[]; if(G.screen==='rank') paintRank(); return; }
  try{
    const res = await window.storage.list('lb:', true);
    const rows = [];
    for(const k of (res && res.keys ? res.keys : []).slice(0,20)){
      try{
        const r = await window.storage.get(k, true);
        if(r && r.value) rows.push(JSON.parse(r.value));
      }catch(e){}
    }
    rows.sort((a,b)=>(b.story-a.story)||(b.dex-a.dex)||(b.wins-a.wins));
    rankCache = rows;
  }catch(e){ rankCache = []; }
  if(G.screen==='rank' && !bossMode) paintRank();
}
const PROG_LABEL = ['1장','2장','3장','4장','최종장','엔딩','진엔딩 ★','이세계 1장','이세계 2장','이세계 3장','이세계 4장','이세계 최종장','이세계 클리어 ★★'];
function paintRank(){
  clearGrid();
  setCell(2,1,'― 사내 랭킹 보드 ―  (함께 플레이하는 전원에게 공개)','bold');
  ['순위','이름','진행도','도감','황금','승수'].forEach((h,i)=>setCell(4,1+i,h,'hdr'));
  const rows = rankCache||[];
  rows.slice(0,20).forEach((p,i)=>{
    const r = 5+i;
    setCell(r,1,String(i+1),'num');
    setCell(r,2,p.name, p.name===G.name?'bold':'');
    setCell(r,3,PROG_LABEL[Math.min(p.story||0,PROG_LABEL.length-1)]);
    setCell(r,4,`${p.dex||0}/${ALL_SIDS.length}`,'num');
    setCell(r,5,String(p.gold||0),'num');

  setCell(ROWS-1,1,'1. 돌아간다','choice',()=>{ G.screen = G.party.length?'hub':'title'; render(); });
  if(G.party.length) paintPartyPanel();
  setFx('=RANK(나, 사내랭킹)');
}

function paintPartyPanel(){
  setCell(2,7,'■ 파티 현황','hdr'); setCell(2,8,'LV','hdr'); setCell(2,9,'HP','hdr'); setCell(2,10,'상태','hdr');
  G.party.forEach((m,i)=>{
    const r = 3+i;
    setCell(r,7,(i===G.active?'▶ ':'')+monName(m), monCls(m)||(i===G.active?'bold':''));
    setCell(r,8,String(m.lv),'num');
    setCell(r,9,`${m.hp}/${m.maxhp}`,'num');
    setCell(r,10, m.hp<=0?'기절': m.hp<m.maxhp*0.3?'위험':'정상', m.hp<=0?'dim':'');
  });
  let r = 3+G.party.length+1;
  setCell(r,7,'■ 자산','hdr'); setCell(r,8,'수량','hdr'); r++;
  setCell(r,7,'복지포인트'); setCell(r,8,G.money.toLocaleString()+'P','num hl'); r++;
  for(const k of ['clip','goldclip','bacchus','hotsix','coffee']){
    if(G.items[k]>0 || k==='clip' || k==='bacchus'){
      setCell(r,7,ITEM_DEF[k].name); setCell(r,8,String(G.items[k]),'num'); r++;
    }
  }
  r++;
  setCell(r,7,'도감'); setCell(r,8,`${dexCaughtCount()}/${ALL_SIDS.length}`,'num'); r++;
  setCell(r,7,'승수'); setCell(r,8,String(G.wins),'num');
}

function paint(lines, choices, fx){
  clearGrid();
  let r = 2;
  for(const ln of lines){
    if(r>ROWS-2) break;
    if(typeof ln === 'string') setCell(r,1,ln);
    else setCell(r,1,ln[0],ln[1]);
    r++;
  }
  r++;
  choices.forEach((ch,i)=>{
    if(r>ROWS) return;
    setCell(r,1,`${i+1}. ${ch[0]}`,'choice',ch[1]);
    r++;
  });
  if(G.screen!=='title') paintPartyPanel();
  setFx(fx || '');
}

let boxMode = 'view';
const BOX_PAGE_SIZE = 7; /* 숫자키(1~9)로 전부 선택 가능하도록 7마리 + 페이지/돌아가기 */
let boxPage = 0, boxSel = -1, boxMsg = '';
function scrBox(){
  const lines = [['― 보관함 (사물함) ―','bold'],''];
  if(boxMode==='deposit'){
    lines.push('누구를 보관함에 넣을까? (선두 제외)');
    const choices = [];
    G.party.forEach((m,i)=>{
      if(i!==G.active) choices.push([`${monName(m)} LV${m.lv} 보관`, ()=>{
        G.box.push(m);
        G.party.splice(i,1);
        if(G.active>i) G.active--;
        boxMode='view'; render();
      }]);
    });
    choices.push(['취소', ()=>{ G.screen='party'; render(); }]);
    paint(lines, choices);
    return;
  }
  const selMon = boxSel>=0 ? G.box[boxSel] : null;
  /* 방생 확인 */
  if(selMon && boxMode==='release'){
    lines.push([`정말 ${monName(selMon)} (LV${selMon.lv})을(를) 풀어줄까?`,'hl'],'');
    lines.push(['풀어준 몬스터는 다시 돌아오지 않는다!','dim']);
    paint(lines,[
      ['풀어준다', ()=>{
        boxMsg = `${monName(selMon)}이(가) 자유를 찾아 떠났다…`;
        G.box.splice(boxSel,1);
        boxSel=-1; boxMode='view'; render();
      }],
      ['그만둔다', ()=>{ boxMode='view'; render(); }],
    ]);
    return;
  }
  /* 상세 보기 */
  if(selMon){
    lines.push([`${monName(selMon)}  LV${selMon.lv} [${monType(selMon)}]`, monCls(selMon)]);
    lines.push(`HP ${selMon.hp}/${selMon.maxhp} · 공격 ${selMon.atk} · EXP ${selMon.exp}/${expNeed(selMon.lv)}`);
    lines.push(['기술: '+knownMoves(selMon).map(mv=>mv[1]).join(', '),'dim']);
    if(selMon.trait) lines.push([`특성: ${selMon.trait} — ${TRAITS[selMon.trait]}`,'dim']);
    const choices = [];
    if(G.party.length<4) choices.push(['파티로 꺼낸다', ()=>{
      G.party.push(selMon); G.box.splice(boxSel,1); boxSel=-1; render();
    }]);
    else lines.push('',['파티가 가득 차서 꺼낼 수 없다. (최대 4마리)','dim']);
    choices.push(['풀어준다 (방생)', ()=>{ boxMode='release'; render(); }]);
    choices.push(['목록으로', ()=>{ boxSel=-1; render(); }]);
    paint(lines, choices);
    return;
  }
  /* 목록 (페이지) */
  if(boxMsg){ lines.push([boxMsg,'hl'],''); boxMsg=''; }
  const totalPages = Math.max(1, Math.ceil(G.box.length/BOX_PAGE_SIZE));
  if(boxPage>=totalPages) boxPage = totalPages-1;
  if(G.box.length===0) lines.push('보관함이 비어 있다.');
  else {
    lines.push([`보관 중 ${G.box.length}마리 · ${boxPage+1}/${totalPages} 페이지`,'dim']);
    lines.push('몬스터를 선택하면 꺼내기 / 풀어주기를 할 수 있다.');
  }
  const choices = [];
  const start = boxPage*BOX_PAGE_SIZE;
  G.box.slice(start, start+BOX_PAGE_SIZE).forEach((m,i)=>{
    choices.push([`${monName(m)} LV${m.lv} [${monType(m)}] HP ${m.hp}/${m.maxhp}${m.trait?' · '+m.trait:''}`,
      ()=>{ boxSel = start+i; render(); }]);
  });
  if(totalPages>1) choices.push([`다음 페이지 ▶ (${(boxPage+1)%totalPages+1}/${totalPages})`,
    ()=>{ boxPage=(boxPage+1)%totalPages; render(); }]);
  choices.push(['돌아간다', ()=>{ boxSel=-1; boxPage=0; G.screen='party'; render(); }]);
  paint(lines, choices);
}

/* ── 합성 실험실: 동종 = 등급 도전(저확률) / 이종 = 레시피 신종 ── */
const FUSE_COST = { normal:500, gold:1500, prism:4000 };
const FUSE_RATE = { normal:0.10, gold:0.12, prism:0.15 };
const NEXT_RAR  = { normal:'gold', gold:'prism', prism:'legend' };
const RECIPE_COST = 2000;
const FUSION_RECIPES = [
  { mats:['latte','gian'],            to:'cafegriffin' },
  { mats:['slimeking','shredgator'],  to:'dochydra' },
  { mats:['beambat','vending'],       to:'sparkmimic' },
  { mats:['americano','nightghost'],  to:'overcat' },
  /* 이세계 레시피 (2부) */
  { mats:['manaslime','golemknight'], to:'archgolem' },
  { mats:['elfintern','orcforeman'],  to:'halforc' },
  { mats:['wyvernfax','mimicdesk'],   to:'paperdragon' },
  /* 패치 보상 캐릭터 합성 */
  { mats:['leejunseok','parksangkyu'], to:'wontaebo' },
];
function allMons(){ return [...G.party, ...G.box]; }
function removeMon(m){
  let i = G.party.indexOf(m);
  if(i>=0){ G.party.splice(i,1); if(G.active>=G.party.length) G.active=Math.max(0,G.party.length-1); return; }
  i = G.box.indexOf(m);
  if(i>=0) G.box.splice(i,1);
}
function addMon(m){
  if(G.party.length<4) G.party.push(m); else G.box.push(m);
  if(G.active>=G.party.length) G.active=0;
}
let fuseMsg = '';
function scrFusion(){
  const lines = [['― 합성 실험실 ―','bold'],'',
    ['동종 합성: 같은 종·같은 등급 2마리 → 낮은 확률로 등급 상승. 실패해도 부재료는 소멸!','dim'],
    ['이종 합성: 특정 조합 2마리 → 새로운 종 탄생 (재료 모두 소멸, 항상 성공)','dim'],''];
  if(fuseMsg){ lines.push([fuseMsg,'hl'],''); fuseMsg=''; }
  lines.push(`복지포인트: ${G.money.toLocaleString()}P`);
  const choices = [];
  /* 동종 후보 */
  const groups = {};
  for(const m of allMons()){
    const rar = m.rar||'normal';
    if(rar==='legend') continue;
    const k = m.sid+'|'+rar;
    (groups[k]=groups[k]||[]).push(m);
  }
  for(const k of Object.keys(groups)){
    const g = groups[k];
    if(g.length<2) continue;
    g.sort((a,b)=>b.lv-a.lv);
    let main = g[0];
    let sub = g.slice(1).find(x=>G.box.includes(x)) || g[1];
    /* 파티가 비지 않도록: 부재료가 파티의 마지막 1마리면 역할 교환 */
    if(G.party.length===1 && G.party[0]===sub){ const t=main; main=sub; sub=t; }
    const rar = main.rar||'normal';
    choices.push([`[동종] ${monName(main)} LV${main.lv} + LV${sub.lv} → ${RARITY[NEXT_RAR[rar]].prefix.trim()} 도전 ${Math.round(FUSE_RATE[rar]*100)}% · ${FUSE_COST[rar]}P`, ()=>{
      if(G.money<FUSE_COST[rar]){ fuseMsg='복지포인트가 부족하다…'; render(); return; }
      G.money -= FUSE_COST[rar];
      removeMon(sub);
      if(Math.random()<FUSE_RATE[rar]){
        main.rar = NEXT_RAR[rar];
        if(main.rar==='legend' && !main.trait){
          const keys = Object.keys(TRAITS);
          main.trait = keys[Math.floor(Math.random()*keys.length)];
        }
        recalcMonStats(main); main.hp = main.maxhp;
        dexCatch(main.sid, main.rar);
        fuseMsg = `✨ 합성 대성공!! ${monName(main)}(으)로 다시 태어났다!`;
      } else {
        fuseMsg = `합성 실패… 부재료가 빛이 되어 사라졌다. (${monName(main)}은(는) 무사하다)`;
      }
      render();
    }]);
  }
  /* 이종 후보 */
  for(const rc of FUSION_RECIPES){
    const a  = allMons().find(m=>m.sid===rc.mats[0]);
    const b2 = allMons().find(m=>m.sid===rc.mats[1] && m!==a);
    if(a && b2){
      choices.push([`[이종] ${SPECIES[rc.mats[0]].name} + ${SPECIES[rc.mats[1]].name} → ??? · ${RECIPE_COST}P`, ()=>{
        if(G.money<RECIPE_COST){ fuseMsg='복지포인트가 부족하다…'; render(); return; }
        G.money -= RECIPE_COST;
        const lv = Math.max(3, Math.round((a.lv+b2.lv)/2));
        const rar = RARITY[a.rar||'normal'].rank >= RARITY[b2.rar||'normal'].rank ? (a.rar||'normal') : (b2.rar||'normal');
        removeMon(a); removeMon(b2);
        const nm = makeMon(rc.to, lv, rar);
        addMon(nm);
        dexCatch(rc.to, rar);
        fuseMsg = `🧬 이종 합성!! 새로운 종 [${monName(nm)}]이(가) 탄생했다!!`;
        render();
      }]);
    } else if(G.dex[rc.mats[0]] && G.dex[rc.mats[1]]){
      lines.push([`레시피 발견: ${SPECIES[rc.mats[0]].name} + ${SPECIES[rc.mats[1]].name} → ??? (재료 부족)`,'dim']);
    }
  }
  if(choices.length===0) lines.push('','지금 합성 가능한 조합이 없다. (같은 종·같은 등급 2마리, 또는 레시피 재료 2마리)');
  choices.push(['돌아간다', ()=>{ G.screen='hub'; render(); }]);
  paint(lines, choices);
}

function pushLog(s){ G.log.push(s); if(G.log.length>9) G.log.shift(); }

function ensureAliveLead(){
  if(activeMon().hp<=0){
    const idx = G.party.findIndex(m=>m.hp>0);
    if(idx>=0) G.active = idx;
  }
}

function startWildBattle(enemy){
  ensureAliveLead();
  dexSee(enemy.sid);
  G.battle = { enemy, wild:true, over:false, menu:'main' };
  G.log = [`야생의 ${monName(enemy)}(LV${enemy.lv})이(가) 나타났다!`];
  if(enemy.rar==='gold') G.log.push('황금빛으로 빛나고 있다…! (희귀 개체)');
  if(enemy.rar==='prism') G.log.push('공기가 일렁이며 무지갯빛으로 빛난다…!! (초희귀 개체)');
  if(enemy.rar==='legend') G.log.push(`전설로만 듣던 기운이 휘몰아친다…!! 절대 놓치지 마라! (특성: ${enemy.trait})`);
  if(SPECIES[enemy.sid].legend) G.log.push('압도적인 야근의 기운이 느껴진다…!');
  G.screen='battle'; render();
}

function startBossBattle(idx){
  ensureAliveLead();
  if(aliveMons().length===0){ pendingMsg.push('싸울 수 있는 몬스터가 없다. 먼저 회복하자.'); render(); return; }
  const B = BOSSES[idx];
  const party = B.party.map(([sid,lv])=>makeMon(sid,lv));
  party.forEach(m=>dexSee(m.sid));
  G.battle = { enemyParty:party, eIdx:0, enemy:party[0], wild:false, bossIdx:idx, over:false, menu:'main' };
  G.log = [B.pre, `${B.name}이(가) ${monName(party[0])}을(를) 내보냈다!`];
  G.screen='battle'; render();
}

function dmgCalc(attacker, power, moveType, defender){
  const mult = moveType ? typeMult(moveType, monType(defender)) : 1;
  const critRate = attacker.trait==='집중' ? 0.20 : 0.08;
  const crit = Math.random()<critRate ? 1.5 : 1;
  let base = attacker.atk * power/40 * mult * crit * (0.85+Math.random()*0.3);
  if(defender.trait==='강철') base *= 0.8;
  return { val: Math.max(1, Math.round(base)), mult, crit: crit>1 };
}
/* 레전드 패시브 (행동 직후 발동) */
function applyTraits(actor, dealt){
  if(actor.hp<=0) return;
  if(actor.trait==='흡혈' && dealt>0 && actor.hp<actor.maxhp){
    const heal = Math.min(actor.maxhp-actor.hp, Math.max(1,Math.round(dealt*0.25)));
    actor.hp += heal;
    pushLog(`${monName(actor)}의 [흡혈] 발동! HP ${heal} 회복`);
  }
  if(actor.trait==='재생' && actor.hp<actor.maxhp){
    const heal = Math.min(actor.maxhp-actor.hp, Math.max(1,Math.round(actor.maxhp*0.06)));
    actor.hp += heal;
    pushLog(`${monName(actor)}의 [재생] 발동! HP ${heal} 회복`);
  }
}
function fxTag(mult, crit){
  let s='';
  if(crit) s+=' 급소!';
  if(mult>1) s+=' (효과 굉장!)'; else if(mult<1) s+=' (효과 별로…)';
  return s;
}

/* 적 AI: 상성·위력 기대값이 높은 기술 선택. 보스는 항상, 야생은 35% 확률로 똑똑하게 */
function pickEnemyMove(e, target, smart){
  const mvs = knownMoves(e);
  if(!smart) return mvs[Math.floor(Math.random()*mvs.length)];
  let best = mvs[0], bestScore = -1;
  for(const mv of mvs){
    const score = mv[2] * (mv[3] ? typeMult(mv[3], monType(target)) : 1);
    if(score > bestScore){ bestScore = score; best = mv; }
  }
  return best;
}
function enemyTurn(){
  const b=G.battle; if(b.over) return;
  const e=b.enemy, me=activeMon();
  if(e.hp<=0) return;
  const mv = pickEnemyMove(e, me, !b.wild || Math.random() < (G.floor>=6 ? 0.7 : 0.35));
  const {val,mult,crit} = dmgCalc(e, mv[2], mv[3], me);
  me.hp = Math.max(0, me.hp - val);
  pushLog(`${monName(e)}의 ${mv[1]}! ${val} 데미지${fxTag(mult,crit)}`);
  applyTraits(e, val);
  if(me.hp<=0){
    pushLog(`${monName(me)}이(가) 기절했다!`);
    if(aliveMons().length===0){
      b.over=true;
      pushLog('더 싸울 몬스터가 없다… 눈앞이 깜깜해졌다.');
      setTimeout(()=>{ G.screen='gameover'; render(); },40);
    } else {
      b.menu='forceSwitch';
    }
  }
}

function grantExpAndMoney(e, moneyMult){
  const me = activeMon();
  const exp = e.lv*13;
  const pay = Math.round(e.lv*15*RARITY[e.rar||'normal'].pay*(moneyMult||1));
  G.money += pay;
  me.exp += exp;
  pushLog(`경험치 ${exp}, 복지포인트 ${pay}P 획득!`);
  while(me.exp >= expNeed(me.lv)){
    me.exp -= expNeed(me.lv);
    me.lv++;
    const before = knownMoves(me).map(m=>m[1]);
    const dope = me.dope||1;
    const st = statsFor(me.sid, me.lv, me.rar);
    const newMax = Math.round(st.maxhp*dope);
    const gain = Math.max(0, newMax - me.maxhp);
    me.maxhp = newMax; me.atk = Math.round(st.atk*dope);
    me.hp = Math.min(me.maxhp, me.hp+gain);
    pushLog(`${monName(me)} 레벨 업! → LV${me.lv}`);
    const evo = SPECIES[me.sid].evo;
    if(evo && me.lv>=evo.lv){
      const oldName = monName(me);
      /* 돌연변이: 진화 순간 낮은 확률로 별개의 특별종이 된다 */
      const mutated = evo.mut && Math.random()<evo.mut.p;
      me.sid = mutated ? evo.mut.to : evo.to;
      const st2 = statsFor(me.sid, me.lv, me.rar);
      const ratio = me.hp/me.maxhp;
      me.maxhp = Math.round(st2.maxhp*dope); me.atk = Math.round(st2.atk*dope);
      me.hp = Math.max(1, Math.round(me.maxhp*ratio));
      if(mutated) pushLog(`!!! 돌연변이 진화 !!! ${oldName}이(가) 특별한 개체 ${monName(me)}(으)로 다시 태어났다!!`);
      else pushLog(`!! ${oldName}이(가) ${monName(me)}(으)로 진화했다 !!`);
      dexCatch(me.sid, me.rar);
    }
    const after = knownMoves(me).map(m=>m[1]);
    after.filter(n=>!before.includes(n)).forEach(n=>pushLog(`새 기술 [${n}]을(를) 배웠다!`));
  }
}

function countCoolerWin(){
  if(G.coolerCd>0){
    G.coolerCd--;
    if(G.coolerCd===0) pushLog('🚰 새 생수통이 도착했다! 정수기를 다시 쓸 수 있다.');
  }
}
function winWild(){
  const b=G.battle; b.over=true; G.wins++; countCoolerWin();
  pushLog(`${monName(b.enemy)}을(를) 쓰러뜨렸다!`);
  grantExpAndMoney(b.enemy, 1);
  if(Math.random()<0.4){
    const drop = Math.random()<0.6?'clip':'bacchus';
    G.items[drop]++;
    pushLog(`${ITEM_DEF[drop].name} 1개를 주웠다!`);
  }
}

function onTrainerMonDown(){
  const b=G.battle, B=BOSSES[b.bossIdx];
  pushLog(`${monName(b.enemy)}을(를) 쓰러뜨렸다!`);
  grantExpAndMoney(b.enemy, 1.3);
  b.eIdx++;
  if(b.eIdx < b.enemyParty.length){
    b.enemy = b.enemyParty[b.eIdx];
    pushLog(`${B.name}이(가) ${monName(b.enemy)}을(를) 내보냈다!`);
  } else {
    b.over=true; G.wins++; countCoolerWin();
    G.money += B.reward;
    pushLog(`★ ${B.name}에게 승리! 보상 ${B.reward}P!`);
    if(!canAutoSave) pushLog('💾 큰 진행을 했다! [백업 코드]를 발급해 보관해 두자.');
    if(b.bossIdx===G.story){
      G.story++;
      if(G.story===5 || G.story===6 || G.story===11){ setTimeout(()=>{ G.screen='ending'; render(); },40); return; }
      b.afterStory = true;
    }
  }
}

function playerMove(mvIdx){
  const b=G.battle; if(b.over) return;
  const me=activeMon(), e=b.enemy;
  if(me.hp<=0){ b.menu='forceSwitch'; render(); return; }
  const mv = knownMoves(me)[mvIdx];
  const {val,mult,crit} = dmgCalc(me, mv[2], mv[3], e);
  e.hp = Math.max(0, e.hp - val);
  pushLog(`${monName(me)}의 ${mv[1]}! ${val} 데미지${fxTag(mult,crit)}`);
  applyTraits(me, val);
  /* 주의: enemyTurn()이 menu를 forceSwitch로 바꿀 수 있으므로 main 초기화는 반드시 그 전에 */
  b.menu='main';
  if(e.hp<=0){
    if(b.wild) winWild(); else onTrainerMonDown();
  } else enemyTurn();
  render();
}

function throwClip(gold){
  const b=G.battle; if(b.over||!b.wild) return;
  const key = gold?'goldclip':'clip';
  if(G.items[key]<=0){ pushLog(`${ITEM_DEF[key].name}이(가) 없다!`); render(); return; }
  G.items[key]--;
  const e=b.enemy;
  let chance = (0.22 + 0.65*(1 - e.hp/e.maxhp)) * (gold?1.6:1);
  chance *= RARITY[e.rar||'normal'].catch;
  if(SPECIES[e.sid].legend) chance *= 0.45;
  b.menu='main';
  if(Math.random()<chance){
    pushLog(`클립이 ${monName(e)}을(를) 집었다! 포획 성공!!`);
    e.hp = Math.max(1, e.hp);
    if(G.party.length<4){ G.party.push(e); pushLog('파티에 합류했다.'); }
    else { G.box.push(e); pushLog('파티가 가득 차서 보관함으로 이동했다.'); }
    dexCatch(e.sid, e.rar);
    if(e.trait) pushLog(`특성 [${e.trait}] — ${TRAITS[e.trait]}`);
    if(!canAutoSave && RARITY[e.rar||'normal'].rank>=2) pushLog('💾 희귀 개체 획득! 잃기 전에 [백업 코드]를 발급해 두자.');
    b.over=true;
  } else {
    pushLog(`아깝다! ${monName(e)}이(가) 클립을 튕겨냈다!`);
    enemyTurn();
  }
  render();
}

function useHeal(kind){
  const b=G.battle; if(b.over) return;
  const me=activeMon();
  if(me.hp<=0){ b.menu='forceSwitch'; render(); return; }
  if(G.items[kind]<=0){ pushLog('아이템이 없다!'); render(); return; }
  if(me.hp>=me.maxhp){ pushLog('HP가 이미 가득하다!'); render(); return; }
  G.items[kind]--;
  if(kind==='bacchus'){ me.hp=Math.min(me.maxhp, me.hp+35); pushLog(`${monName(me)} HP 35 회복!`); }
  else { me.hp=me.maxhp; pushLog(`${monName(me)} HP 완전 회복!`); }
  b.menu='main'; enemyTurn(); render();
}

function tryRun(){
  const b=G.battle; if(b.over) return;
  if(!b.wild){ pushLog('보스 앞에서 도망칠 수는 없다…!'); render(); return; }
  b.menu='main';
  if(Math.random()<0.7){ pushLog('무사히 도망쳤다!'); b.over=true; }
  else { pushLog('도망칠 수 없었다!'); enemyTurn(); }
  render();
}

function switchMon(i, free){
  const b=G.battle;
  if(G.party[i].hp<=0 || i===G.active) return;
  G.active=i;
  pushLog(`가라, ${monName(G.party[i])}!`);
  b.menu='main';

  render();
}

function scrBattle(){
  setStatus('계산 중...');
  const b=G.battle, e=b.enemy, me=activeMon();
  /* 선두가 기절 상태로 메인 메뉴에 머무는 일이 없도록 (구버전 저장 데이터 복구 겸) */
  if(!b.over && me.hp<=0 && aliveMons().length>0) b.menu='forceSwitch';
  const bossLabel = b.wild ? '' : ` 〔${BOSSES[b.bossIdx].name} ${b.eIdx+1}/${b.enemyParty.length}〕`;
  const lines = [
    [`⚔ ${monName(e)}  LV${e.lv}  [${monType(e)}]${bossLabel}`, monCls(e)||'bold'],
    [`   HP ${e.hp}/${e.maxhp}  ${'█'.repeat(Math.ceil(e.hp/e.maxhp*10)).padEnd(10,'░')}`, e.hp<e.maxhp*0.3?'hl':''],
    '',
    ...G.log,
    '',
  ];
  let choices = [];
  if(b.over){
    const next = b.afterStory
      ? ()=>{ pendingMsg.push(BOSSES[b.bossIdx].win); G.screen='storyBeat'; storyBeatNext='hub'; render(); }
      : ()=>{ G.screen='hub'; render(); };
    if(aliveMons().length>0) choices=[['전투 종료 — 돌아간다', next]];
  } else if(b.menu==='forceSwitch'){
    G.party.forEach((m,i)=>{ if(m.hp>0) choices.push([`${monName(m)} 교체 투입 (HP ${m.hp})`, ()=>switchMon(i,true)]); });
  } else if(b.menu==='moves'){
    knownMoves(me).forEach((mv,i)=>{
      choices.push([`${mv[1]} (위력 ${mv[2]}${mv[3]?', '+mv[3]:''})`, ()=>playerMove(i)]);
    });
    choices.push(['← 뒤로', ()=>{ b.menu='main'; render(); }]);
  } else if(b.menu==='bag'){
    if(b.wild){
      choices.push([`집게클립 던지기 (${G.items.clip})`, ()=>throwClip(false)]);
      if(G.items.goldclip>0) choices.push([`골드클립 던지기 (${G.items.goldclip})`, ()=>throwClip(true)]);
    }
    choices.push([`박카스 — HP 35 (${G.items.bacchus})`, ()=>useHeal('bacchus')]);
    if(G.items.hotsix>0) choices.push([`핫식스 — 완전 회복 (${G.items.hotsix})`, ()=>useHeal('hotsix')]);
    choices.push(['← 뒤로', ()=>{ b.menu='main'; render(); }]);
  } else if(b.menu==='switch'){
    G.party.forEach((m,i)=>{
      if(i!==G.active && m.hp>0) choices.push([`${monName(m)} (HP ${m.hp}/${m.maxhp})`, ()=>switchMon(i,false)]);
    });
    choices.push(['← 뒤로', ()=>{ b.menu='main'; render(); }]);
  } else {
    choices = [
      ['공격한다', ()=>{ b.menu='moves'; render(); }],
      ['가방 (포획/회복)', ()=>{ b.menu='bag'; render(); }],
    ];
    if(G.party.filter((m,i)=>i!==G.active&&m.hp>0).length>0)
      choices.push(['교체한다', ()=>{ b.menu='switch'; render(); }]);
    choices.push([b.wild?'도망간다':'도망갈 수 없다…', tryRun]);
  }
  paint(lines, choices, `=BATTLE("${monName(e)}", ${e.hp})`);
}

function closeDlg(){ dlg.classList.remove('show'); }

function encodeSave(){
  return btoa(unescape(encodeURIComponent(JSON.stringify(G))));
}
/* v2(황금 boolean) 백업 코드 → v3(rar 등급) 변환 */
function migrateSave(obj){
  if(obj.v===2){
    for(const m of [...(obj.party||[]), ...(obj.box||[])]){
      m.rar = m.gold ? 'gold' : 'normal';
      delete m.gold;
    }
    obj.rarDex = {};
    for(const sid of Object.keys(obj.goldDex||{})) obj.rarDex[sid]='gold';
    delete obj.goldDex;
    obj.battle = null;
    if(obj.screen==='battle') obj.screen='hub';
    obj.v = 3;
  }
  if(!obj.rarDex) obj.rarDex = {};
  if(!obj.coolerCd) obj.coolerCd = 0;
  if(obj.items && obj.items.ample===undefined) obj.items.ample = 0;
  if(obj.isekai===undefined) obj.isekai = false;
  if(!obj.gifts) obj.gifts = {};
  return obj;
}
function decodeSave(code){
  const obj = JSON.parse(decodeURIComponent(escape(atob(code.trim()))));
  if(!obj || (obj.v!==2 && obj.v!==3) || !Array.isArray(obj.party)) throw new Error('bad');
  if(!obj.name) obj.name = '사원'+Math.floor(Math.random()*900+100);
  return migrateSave(obj);
}
function openSaveDlg(){
  document.getElementById('dlgtitle').textContent = '이름 정의 — 백업';
  document.getElementById('dlgdesc').textContent = '아래 코드를 복사해 메모장 등에 보관하세요. [확인]을 누르면 불러오기 모드로 전환됩니다.';
  dlgText.value = encodeSave();
  dlgText.onfocus = ()=>dlgText.select();
  dlgOk.textContent = '불러오기로 전환';
  dlgOk.onclick = openLoadDlg;
  dlg.classList.add('show');
  dlgText.focus();
}
function openLoadDlg(){
  document.getElementById('dlgtitle').textContent = '이름 정의 — 복원';
  document.getElementById('dlgdesc').textContent = '보관해 둔 백업 코드를 붙여넣고 [확인]을 누르세요.';
  dlgText.value = '';
  dlgText.onfocus = null;
  dlgOk.textContent = '확인';
  dlgOk.onclick = ()=>{
    try {
      G = decodeSave(dlgText.value);
      closeDlg();
      pendingMsg.push('백업 코드에서 진행 상황을 복원했다!');
      if(G.screen==='battle'||G.screen==='storyBeat') G.screen='hub';
      render();
    } catch(e){
      document.getElementById('dlgdesc').textContent = '코드를 해석할 수 없습니다. 전체를 정확히 붙여넣었는지 확인하세요.';
    }
  };
  dlg.classList.add('show');
  dlgText.focus();
}

    setCell(cell.r, cell.c, (k in fakeEdits) ? fakeEdits[k] : cell.text, cell.cls);
  }
  for(const k in fakeEdits){
    if(painted.has(k)) continue;
    const [r,c] = k.split(',').map(Number);
    setCell(r, c, fakeEdits[k]);
  }
  sheetEl.querySelectorAll('td').forEach(td=>{ td.contentEditable = 'true'; });
}

/* 위장 시트 셀 편집: 입력 즉시 저장, Enter = 편집 종료 (엑셀처럼) */
sheetEl.querySelectorAll('td').forEach(td=>{
  td.addEventListener('input', ()=>{
    if(!bossMode) return;
    fakeEdits[td.dataset.r+','+td.dataset.c] = td.textContent;
    saveFakeEdits();
  });
  td.addEventListener('keydown', e=>{
    if(bossMode && e.key==='Enter'){ e.preventDefault(); td.blur(); }
  });
});

document.addEventListener('keydown', e=>{
  if(e.key==='Escape'){
    if(dlg.classList.contains('show')){ closeDlg(); return; }
    bossMode=!bossMode; render(); return;
  }
  if(dlg.classList.contains('show')) return;
  if(!bossMode && /^[1-9]$/.test(e.key)){
    const tds=[...sheetEl.querySelectorAll('td.choice')];
    if(tds[+e.key-1]) tds[+e.key-1].click();
  }
});

/* 부팅: 로컬 캐시가 있으면 타이틀 없이 즉시 이어서 실행 */
function bootLoad(){
  localLoadCheck();
  if(!hasCloud && cloudSaveData){ resumeSave(cloudSaveData); return; }
  render();
}
bootLoad();
cloudLoadCheck();
</script>
</body>
</html>
