const COLS = 11, ROWS = 32;
const colName = i => String.fromCharCode(65+i);
const sheetEl = document.getElementById('sheet');
let cells = [];

(function buildGrid(){
  let html = '<tr><th class="corner"></th>';
  for(let c=0;c<COLS;c++) html += `<th class="colhead">${colName(c)}</th>`;
  html += '</tr>';
  for(let r=1;r<=ROWS;r++){
    html += `<tr><th class="rowhead">${r}</th>`;
    for(let c=0;c<COLS;c++) html += `<td data-r="${r}" data-c="${c}"></td>`;
    html += '</tr>';
  }
  sheetEl.innerHTML = html;
  cells = Array.from({length:ROWS+1},()=>[]);
  sheetEl.querySelectorAll('td').forEach(td=>{
    cells[+td.dataset.r][+td.dataset.c] = td;
    td.addEventListener('click', ()=>{
      document.querySelectorAll('td.selected').forEach(x=>x.classList.remove('selected'));
      td.classList.add('selected');
      document.getElementById('namebox').textContent = colName(+td.dataset.c)+td.dataset.r;
      document.getElementById('fxcontent').textContent = td.textContent;
    });
  });
})();

function clearGrid(){
  sheetEl.querySelectorAll('td').forEach(td=>{ td.textContent=''; td.className=''; td.onclick=null; td.contentEditable='false'; });
}
function setCell(r,c,text,cls,onclick){
  if(r>ROWS||c>=COLS||r<1) return;
  const td = cells[r][c];
  td.textContent = text;
  if(cls) td.className = cls;
  if(onclick){ td.classList.add('choice'); td.onclick = e=>{ e.stopPropagation(); onclick(); }; }
}
function setStatus(t){ document.getElementById('statustext').textContent = t; }
function setFx(t){ document.getElementById('fxcontent').textContent = t; }

  if(att==='야근' && def!=='야근') return 1.3;
  if(def==='야근' && att!=='야근') return 1.3;
  if(TRIANGLE[att]===def) return 1.5;
  if(TRIANGLE[def]===att) return 0.67;
  return 1;
}

/* 개체 희귀도 (종족 legend 플래그와 별개) */
const RARITY = {
  normal:{ mult:1,    catch:1,    pay:1,  prefix:'',      cls:'',       rank:0 },
  gold:  { mult:1.15, catch:0.75, pay:3,  prefix:'황금 ',   cls:'gold',   rank:1 },
  prism: { mult:1.30, catch:0.55, pay:5,  prefix:'프리즘 ',  cls:'prism',  rank:2 },
  legend:{ mult:1.50, catch:0.35, pay:10, prefix:'레전드 ',  cls:'legend', rank:3 },
};
const TRAITS = {
  흡혈:'준 데미지의 25%만큼 HP 회복',
  강철:'받는 데미지 20% 감소',
  집중:'급소율 8% → 20%',
  재생:'자기 턴마다 최대 HP 6% 회복',
};
/* 출현율: 레전드 0.3% / 프리즘 1.5% / 황금 6% */
function rollRarity(){
  const r = Math.random();
  if(r < 0.003) return 'legend';
  if(r < 0.018) return 'prism';
  if(r < 0.078) return 'gold';
  return 'normal';
}
/* HP에 완만한 등비 보정(HP_CURVE)을 곱한다 — 공격력은 사실상 등비로 크는데
   HP가 선형이면 lv66부터 원턴킬 게임이 되기 때문 (v5.3 밸런스) */
const HP_CURVE = 0.025;
function statsFor(sid, lv, rar){
  const s = SPECIES[sid];
  const mult = RARITY[rar||'normal'].mult;
  return {
    maxhp: Math.round((s.hp + (lv-1)*6) * (1 + HP_CURVE*(lv-1)) * mult),
    atk: Math.round(s.atk * (1+0.08*(lv-1)) * mult),
  };
}
function makeMon(sid, lv, rar){
  rar = rar||'normal';
  const st = statsFor(sid, lv, rar);
  const m = { sid, lv, rar, maxhp:st.maxhp, hp:st.maxhp, atk:st.atk, exp:0 };
  if(rar==='legend'){
    const keys = Object.keys(TRAITS);
    m.trait = keys[Math.floor(Math.random()*keys.length)];
  }
  return m;
}
function monName(m){ return RARITY[m.rar||'normal'].prefix + SPECIES[m.sid].name; }
function monCls(m){ return RARITY[m.rar||'normal'].cls; }
function monType(m){ return SPECIES[m.sid].type; }
function knownMoves(m){
  return SPECIES[m.sid].moves.filter(mv=>mv[0]<=m.lv).slice(-4);
}
/* 비선형 성장 곡선: 초반은 기존과 비슷, 중후반은 확연히 느리게 (v2.0 밸런싱) */
function expNeed(lv){ return Math.round(lv*16 + lv*lv*1.5); }
/* 경험치 진행 바 (텍스트 셀용) */
function expPct(m){ return Math.min(99, Math.floor(m.exp/expNeed(m.lv)*100)); }
function expBar(m, width){
  width = width||8;
  const filled = Math.min(width, Math.floor(m.exp/expNeed(m.lv)*width));
  return '▓'.repeat(filled).padEnd(width,'░');
}

/* ── 도핑 (v2.0): 수상한 앰플로 영구 강화/약화. 효과는 배율로 누적 ── */
const DOPE_MAX = 5;
const DOPE_OUTCOMES = [
  { p:0.10, mult:1.20, msg:'★ 대성공!! 온몸에서 빛이 난다! (능력치 +20%)' },
  { p:0.45, mult:1.10, msg:'성공! 힘이 솟구친다. (능력치 +10%)' },
  { p:0.30, mult:0.92, msg:'…부작용이다. 몸이 비틀거린다. (능력치 -8%)' },
  { p:0.15, mult:0.80, msg:'!! 심각한 부작용 !! 몸이 크게 망가졌다… (능력치 -20%)' },
];
function rollDope(){
  let r = Math.random();
  for(const o of DOPE_OUTCOMES){ if(r < o.p) return o; r -= o.p; }
  return DOPE_OUTCOMES[DOPE_OUTCOMES.length-1];
}
function recalcMonStats(m){
  const st = statsFor(m.sid, m.lv, m.rar);
  const dope = m.dope||1;
  const ratio = m.maxhp>0 ? m.hp/m.maxhp : 1;
  m.maxhp = Math.max(1, Math.round(st.maxhp*dope));
  m.atk = Math.max(1, Math.round(st.atk*dope));
  m.hp = m.hp<=0 ? 0 : Math.max(1, Math.round(m.maxhp*ratio));
}
function applyDope(m, outcome){
  m.dope = +(((m.dope||1) * outcome.mult).toFixed(3));
  m.dopeN = (m.dopeN||0) + 1;
  recalcMonStats(m);
}
/* 디톡스 앰플: 도핑 배율·횟수 완전 초기화 (실패한 도핑을 비싸게 되돌리는 보험) */
function applyDetox(m){
  m.dope = 1; m.dopeN = 0;
  recalcMonStats(m);
}

/* ── 패치 이벤트 2: 의문의 머리카락 — 모발이식 원태보 최종 진화 ── */
const HAIR_REQUIRED = 5, HAIR_EVO_RATE = 0.4, HAIR_DROP_RATE = 0.06;
function tryHairEvolution(m){
  if(m.sid!=='wontaebo3' || G.items.hair<HAIR_REQUIRED) return null;
  G.items.hair -= HAIR_REQUIRED;
  if(Math.random()<HAIR_EVO_RATE){
    const oldName = monName(m);
    m.sid = 'wontaebo4';
    recalcMonStats(m); m.hp = m.maxhp;
    dexCatch('wontaebo4', m.rar);
    return `!!! 최종 진화 !!! ${oldName}의 머리카락이 폭풍처럼 자라난다… [${monName(m)}] 탄생!!`;
  }
  return `…머리카락이 바람에 흩어졌다. 진화 실패. (의문의 머리카락 ×${HAIR_REQUIRED} 소멸)`;
}

/* ════════════════ 클라우드 저장 + 공유 랭킹 ════════════════ */
const hasCloud = (typeof window!=='undefined') && !!window.storage;

/* GitHub Pages 등 정적 배포용 공유 랭킹 — Firebase Realtime Database REST.
   본인 프로젝트의 DB URL을 채우면 랭킹 보드가 활성화된다. 비워 두면 보드는 숨겨진다.
   예: 'https://cell-quest-xxxxx-default-rtdb.asia-southeast1.firebasedatabase.app' */
const FIREBASE_DB_URL = 'https://cell-quest-5c949-default-rtdb.asia-southeast1.firebasedatabase.app';
const hasBoard = hasCloud || !!FIREBASE_DB_URL;
const BOARD_THROTTLE_MS = 8000;   /* 도배 방지: 보드 기록 최소 간격 */

let cloudSaveData = null, lastCloudSave = 0, lastBoardSave = 0;

/* 닉네임 정리: 공백·따옴표·HTML 문자와 Firebase 키 금지 문자(. # $ [ ] /)를 제거하고 12자 제한 */
function sanitizeName(raw){
  return (raw||'').trim().replace(/[\s'"\/\\.#$\[\]<>&=?]/g,'').slice(0,12);
}
/* 같은 닉네임끼리 서로 기록을 덮어쓰지 않도록 저장 키에 붙이는 플레이어 식별자 */
function makePid(){ return Math.random().toString(36).slice(2,8); }
function boardKey(){ return G.name + '_' + (G.pid||'0'); }

/* ════════════════ 클라우드 계정 코드 (UUID) — 코드 하나로 어느 기기·주소에서도 이어하기 ════════════════
   ID/PW 대신 추측 불가능한 UUID를 비밀 코드로 사용. RTDB saves/$code 에 저장하고,
   코드를 아는 사람만 그 세이브를 읽고 쓸 수 있다 (보안 규칙으로 목록 조회는 차단). */
const hasCloudSave = !!FIREBASE_DB_URL;
const CLOUD_CODE_KEY = 'cellquest_cloudcode';
let cloudCode = (()=>{ try{ return localStorage.getItem(CLOUD_CODE_KEY) || null; }catch(e){ return null; } })();
let cloudSaving = false;
function makeUUID(){
  if(typeof crypto!=='undefined' && crypto.randomUUID) return crypto.randomUUID();
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{
    const r = Math.random()*16|0; return (c==='x'?r:(r&0x3|0x8)).toString(16);
  });
}
function setCloudCode(code){
  cloudCode = code || null;
  try{ if(cloudCode) localStorage.setItem(CLOUD_CODE_KEY, cloudCode); else localStorage.removeItem(CLOUD_CODE_KEY); }catch(e){}
}
async function saveToCloud(){
  if(!hasCloudSave || !cloudCode) return false;
  flushPlayTime();
  try{
    const r = await fetch(FIREBASE_DB_URL+'/saves/'+encodeURIComponent(cloudCode)+'.json',
      { method:'PUT', body: JSON.stringify(G, saveReplacer) });
    return r.ok;
  }catch(e){ return false; }
}
async function loadFromCloud(code){
  if(!hasCloudSave || !code) return null;
  try{
    const r = await fetch(FIREBASE_DB_URL+'/saves/'+encodeURIComponent(code.trim())+'.json');
    if(!r.ok) return null;
    const obj = await r.json();
    if(obj && (obj.v===2||obj.v===3||obj.v===4) && Array.isArray(obj.party)) return migrateSave(obj);
  }catch(e){}
  return null;
}

/* ── 로컬 캐시 자동 저장 (GitHub Pages 등 클라우드 없는 환경) ──
   브라우저 localStorage에 기록을 남긴다. 기기 간 이동은 여전히 백업 코드 사용. */
const LOCAL_KEY = 'cellquest_save';
const hasLocal = (()=>{ try{ localStorage.setItem(LOCAL_KEY+'_t','1'); localStorage.removeItem(LOCAL_KEY+'_t'); return true; }catch(e){ return false; } })();
const canAutoSave = hasCloud || hasLocal;
/* battle/log는 복원 시 버리는 휘발 상태 — 저장에서 제외 (용량·악용 방지) */
const SAVE_SKIP_KEYS = ['battle','log'];
const saveReplacer = (k,v)=> SAVE_SKIP_KEYS.includes(k) ? undefined : v;
let battleSnapshot = null; /* 전투 시작 직전 상태 — 전투 중 새로고침 악용(보상만 챙기기) 방지 */
function localSave(){
  /* party가 비어 있으면 아직 시작 전(타이틀) — 기존 저장을 덮어쓰지 않는다 */
  if(!hasLocal || G.party.length===0) return;
  flushPlayTime();
  try{
    const data = (G.battle && !G.battle.over && battleSnapshot)
      ? battleSnapshot                            /* 전투 중 = 전투 직전 상태로 저장 */
      : JSON.stringify(G, saveReplacer);
    localStorage.setItem(LOCAL_KEY, data);
  }catch(e){}
}
function localLoadCheck(){
  if(hasCloud || !hasLocal) return;
  try{
    const raw = localStorage.getItem(LOCAL_KEY);
    if(!raw) return;
    const obj = JSON.parse(raw);
    if(obj && (obj.v===2||obj.v===3||obj.v===4) && Array.isArray(obj.party)) cloudSaveData = migrateSave(obj);
  }catch(e){ /* 손상된 캐시는 무시 */ }
}
/* 복원 직후 안전하게 그릴 수 있는 화면 화이트리스트.
   explore처럼 휘발 변수(curArea)에 의존하는 화면은 복원하면 크래시하므로 허브로 보낸다. */
const RESUME_SAFE_SCREENS = ['hub','bag','party','box','dex','ldex','shop','moveFloor','dope','fusion','academy','wiki','gacha','recipe','cloud'];
/* 저장 데이터를 현재 게임으로 복원 (이어하기 / 부팅 자동 복원 공용) */
function resumeSave(d){

async function updateBoard(force){
  if(!hasBoard || !G.name || G.party.length===0) return;
  const now = Date.now();
  if(!force && now-lastBoardSave<BOARD_THROTTLE_MS) return;
  lastBoardSave = now;
  const rarCount = t => Object.values(G.rarDex||{}).filter(x=>x===t).length;
  const entry = {
    name:G.name, wins:G.wins, dex:dexCaughtCount(),
    gold:rarCount('gold'), prism:rarCount('prism'), leg:rarCount('legend'),
    pt:totalPlayMs(), story:G.isekai?G.story+1:G.story, ts:Date.now(),
    /* 파티 스냅샷: 랭킹 보드에서 클릭하면 다른 플레이어의 파티를 볼 수 있다 */
    lead:G.active,
    party:G.party.map(m=>({ s:m.sid, l:m.lv, r:m.rar||'normal', t:m.trait||null, d:+((m.dope||1).toFixed(2)) })),
  };
  /* 서버 인덱스 정렬용 합성 점수 — limitToLast 쿼리로 상위 N명만 받기 위함 */
  entry.score = entry.story*1e6 + entry.dex*1e3 + Math.min(entry.wins,999);
  try{
    if(hasCloud){
      await window.storage.set('lb:'+G.name, JSON.stringify(entry), true);
    } else {
      await fetch(FIREBASE_DB_URL+'/lb/'+encodeURIComponent(boardKey())+'.json',
        { method:'PUT', body:JSON.stringify(entry) });

}

let rankCache = null;
/* 공개 write DB라 어떤 값이 와도 화면이 깨지지 않도록 항목을 정규화한다 */
function normalizeEntry(raw){
  if(!raw || typeof raw!=='object' || typeof raw.name!=='string') return null;
  const num = (v,max)=> (typeof v==='number' && isFinite(v) && v>=0) ? Math.min(v,max) : 0;
  const e = {
    name: sanitizeName(raw.name) || '???',
    wins: num(raw.wins, 9999999), dex: num(raw.dex, ALL_SIDS.length),
    gold: num(raw.gold, 999), prism: num(raw.prism, 999), leg: num(raw.leg, 999),
    pt: num(raw.pt, 365*24*3600*1000), story: num(raw.story, PROG_LABEL.length-1),
    lead: num(raw.lead, 5),
  };
  if(Array.isArray(raw.party)){
    e.party = raw.party.slice(0,6)
      .filter(mm=>mm && typeof mm==='object' && typeof mm.s==='string')
      .map(mm=>({
        s:mm.s, l:num(mm.l,999), r:RARITY[mm.r]?mm.r:'normal',
        t:(typeof mm.t==='string' && TRAITS[mm.t])?mm.t:null,
        d:(typeof mm.d==='number' && isFinite(mm.d) && mm.d>0)?mm.d:1,
      }));
  }
  return e;
}
async function loadRank(){
  if(!hasBoard){ rankCache=[]; if(G.screen==='rank') paintRank(); return; }
  try{
    let rows = [];
    if(hasCloud){
      const res = await window.storage.list('lb:', true);
      for(const k of (res && res.keys ? res.keys : []).slice(0,RANK_MAX_ROWS)){
        try{
          const r = await window.storage.get(k, true);
          if(r && r.value) rows.push(JSON.parse(r.value));
        }catch(e){}
      }
    } else {
      /* score 인덱스 쿼리로 상위 N명만 다운로드. 인덱스 미배포 환경은 전체 조회로 폴백 */
      let res = await fetch(FIREBASE_DB_URL+'/lb.json?orderBy=%22score%22&limitToLast='+RANK_MAX_ROWS);
      if(!res.ok) res = await fetch(FIREBASE_DB_URL+'/lb.json');
      const data = await res.json();
      rows = Object.values(data||{});
    }
    rows = rows.map(normalizeEntry).filter(Boolean);
    rows.sort((a,b)=>(b.story-a.story)||(b.dex-a.dex)||(b.wins-a.wins));
    rankCache = rows.slice(0,RANK_MAX_ROWS);
  }catch(e){ rankCache = []; }
  if(G.screen==='rank' && !bossMode) paintRank();
}

function paintRankDetail(p, idx){

  for(const ln of lines){
    if(r>ROWS-2) break;
    if(typeof ln === 'string') setCell(r,1,ln);
    else setCell(r,1,ln[0],ln[1]);
    r++;
  }
  r++;
  choices.forEach((ch,i)=>{
    if(r>ROWS) return;
    setCell(r,1,`${choiceKey(i)||'·'}. ${ch[0]}`,'choice',ch[1]);
    r++;
  });
  if(G.screen!=='title') paintPartyPanel();
  setFx(fx || '');
}

/* 27층을 한 화면에 다 그릴 수 없으므로 차원(부) → 층 2단 메뉴로 나눈다 */
const DIMENSIONS = [
  { name:'1부 — 사무실 (+ 야근차원)', from:0, to:5, need:0 },
  { name:'2부 — 이세계',           from:6, to:14, need:0, isekai:true },
  { name:'3부 — 신계 본사',         from:15, to:20, need:15, isekai:true },
  { name:'4부 — 공허 컨소시엄',      from:21, to:26, need:21, isekai:true },
];
let moveDim = -1;
function floorUnlocked(i){
  if(i<5) return i<=Math.min(G.story,4);
  if(i===5) return G.story>=5;
  return G.isekai && i<=G.story;
}
function scrMoveFloor(){
  const lines = [[G.isekai?'― 차원 이동 ―':'― 엘리베이터 ―','bold'],'', '어디로 갈까?',''];
  const choices = [];
  if(moveDim<0){
    DIMENSIONS.forEach((d,i)=>{
      if(d.isekai && !G.isekai) return;
      if(d.need && G.story<d.need) return; /* 해금 전 차원은 존재 자체를 숨긴다 */
      const cur = (G.floor>=d.from && G.floor<=d.to) ? ' (현재 위치)' : '';
      choices.push([d.name+cur, ()=>{ moveDim=i; render(); }]);
    });
    choices.push(['돌아간다', ()=>{ G.screen='hub'; render(); }]);
  } else {
    const d = DIMENSIONS[moveDim];
    for(let i=d.from;i<=d.to;i++){
      const f = FLOORS[i];
      if(floorUnlocked(i)) choices.push([f.name + (i===G.floor?' (현재)':''), ()=>{ moveDim=-1; G.floor=i; G.screen='hub'; render(); }]);
      else if(i!==5) choices.push([f.name+' — 잠김 (이전 보스를 꺾어야 함)', ()=>{}]);
    }
    choices.push(['← 차원 선택으로', ()=>{ moveDim=-1; render(); }]);
  }
  paint(lines, choices);
}

const ACADEMY_COST_MULT = 2.2;
function academyCost(m){ return Math.max(500, Math.round(expNeed(m.lv)*ACADEMY_COST_MULT/10)*10); }
function academyLvCap(){

}

/* ── 사내 경품 응모(뽑기): 잉여 포인트 소비처.
   대부분 꽝/클립(해금 차원까지만), 아주 낮은 확률로 특별한 몬스터 ── */
const GACHA_COST = 1000;
/* 가중치 합 1000 = 0.1% 단위. 미해금 클립은 해금된 최고 등급 클립으로 대체 지급 */
const GACHA_TABLE = [
  [380, 'miss',  null],
  [250, 'item',  ['clip', 2]],
  [150, 'item',  ['goldclip', 1]],
  [80,  'item',  ['prismclip', 1]],
  [50,  'item',  ['dimclip', 1]],
  [25,  'item',  ['godclip', 1]],
  [50,  'item',  ['bacchus', 3]],
  [12,  'legendMon', null],        /* 1.2%  — 야생 기본종 1마리 (LV1 · 레전드 등급) */
  [2.5, 'specialMon', null],       /* 0.25% — 합성·돌연변이 특별종 (LV1) */
  [0.5, 'specialLegendMon', null], /* 0.05% — 특별종 + 레전드 등급 */
];
function clipUnlocked(key){
  if(key==='prismclip') return G.isekai;
  if(key==='dimclip') return G.story>=11;
  if(key==='godclip') return G.story>=15;
  return true;
}
function bestUnlockedClip(key){
  const order = ['godclip','dimclip','prismclip','goldclip','clip'];
  let i = Math.max(0, order.indexOf(key));
  while(i<order.length-1 && !clipUnlocked(order[i])) i++;
  return order[i];
}
/* 당첨 몬스터 풀: 해금한 차원의 야생 기본종 / 거기서 도달 가능한 합성·돌연변이 특별종 */
function gachaPools(){
  const reach = new Set();
  FLOORS.forEach((f,i)=>{ if(floorUnlocked(i)) f.areas.forEach(a=>a.pool.forEach(s=>reach.add(s))); });
  const base = [...reach].filter(s=>!SPECIES[s].legend);
  let grew = true;
  while(grew){
    grew = false;
    for(const s of [...reach]){
      const e = SPECIES[s].evo;
      if(!e) continue;
      if(!reach.has(e.to)){ reach.add(e.to); grew=true; }
      if(e.mut && !reach.has(e.mut.to)){ reach.add(e.mut.to); grew=true; }
    }
  }
  const special = [];
  for(const s of ALL_SIDS){
    if(SPECIES[s].legend || !reach.has(s)) continue;
    const isMut = ALL_SIDS.some(x=>SPECIES[x].evo && SPECIES[x].evo.mut && SPECIES[x].evo.mut.to===s);
    if(isMut) special.push(s);
  }
  for(const rc of FUSION_RECIPES){
    if(rc.mats.every(mat=>reach.has(mat)) && !SPECIES[rc.to].legend && !special.includes(rc.to)) special.push(rc.to);
  }
  return { base, special };
}
function drawGachaOnce(pools){
  let r = Math.random()*1000;
  let pick = GACHA_TABLE[0];
  for(const row of GACHA_TABLE){ if(r < row[0]){ pick = row; break; } r -= row[0]; }
  const type = pick[1];
  if(type==='miss') return '꽝… 다음 기회에.';
  if(type==='item'){
    let key = pick[2][0]; const n = pick[2][1];
    if(CLIP_MULT[key]) key = bestUnlockedClip(key);
    G.items[key] += n;
    return `${ITEM_DEF[key].name} ×${n} 당첨!`;
  }
  if(type==='legendMon'){
    const sid = pools.base[Math.floor(Math.random()*pools.base.length)];
    const mon = makeMon(sid, 1, 'legend');
    addMon(mon); dexCatch(sid, 'legend');
    return `🎉 대박!! [${monName(mon)}] (LV1 · 레전드 등급 · 특성 ${mon.trait}) 당첨!!`;
  }
  /* specialMon / specialLegendMon */
  if(pools.special.length===0){
    G.items.goldclip += 3;
    return '특별 경품이 아직 입고 전이라 골드클립 ×3으로 대체! (차원을 더 해금하면 입고된다)';
  }
  const sid = pools.special[Math.floor(Math.random()*pools.special.length)];
  const rar = type==='specialLegendMon' ? 'legend' : 'normal';
  const mon = makeMon(sid, 1, rar);
  addMon(mon); dexCatch(sid, rar);
  return `🌟 초대박!!! 특별 몬스터 [${monName(mon)}]${rar==='legend'?' (레전드 등급!!)':''} 당첨!!!`;
}
let gachaMsg = '';
function scrGacha(){
  const lines = [['― 사내 경품 응모 (뽑기) ―','bold'],'',
    [`1회 ${GACHA_COST.toLocaleString()}P · 10연속 ${(GACHA_COST*10).toLocaleString()}P`,'hl'],
    '경품: 클립류(지금까지 해금한 차원의 클립만) · 박카스 · 그리고…',
    ['초저확률: 레전드 등급 몬스터 1.2% / 특별종 0.25% / 레전드 특별종 0.05% (전부 LV1)','dim'],
    ['(특별종 = 합성·돌연변이로만 얻을 수 있는 종)','dim'],''];
  if(gachaMsg){ gachaMsg.split('\n').forEach(s=>lines.push([s,'hl'])); lines.push(''); gachaMsg=''; }
  lines.push(`보유 복지포인트: ${G.money.toLocaleString()}P`);
  const doDraw = n => () => {
    const cost = GACHA_COST*n;
    if(G.money<cost){ gachaMsg='복지포인트가 부족하다…'; render(); return; }
    G.money -= cost;
    const pools = gachaPools();
    const results = [];
    for(let i=0;i<n;i++) results.push(drawGachaOnce(pools));
    if(n===1) gachaMsg = results[0];
    else {
      const misses = results.filter(s=>s.startsWith('꽝')).length;
      const hits = results.filter(s=>!s.startsWith('꽝'));
      gachaMsg = [`[10연속 결과] 꽝 ${misses}회`, ...hits].join('\n');
    }
    render();
  };
  const choices = [
    [`응모한다 (1회 · ${GACHA_COST.toLocaleString()}P)`, doDraw(1)],
    [`10연속 응모 (${(GACHA_COST*10).toLocaleString()}P)`, doDraw(10)],
    ['돌아간다', ()=>{ G.screen='hub'; render(); }],
  ];
  paint(lines, choices, '=RAND() · 사내복권');
}

/* ── 합성 실험실: 동종 = 등급 도전(저확률) / 이종 = 레시피 신종 ── */
const FUSE_COST = { normal:500, gold:1500, prism:4000 };
const FUSE_RATE = { normal:0.10, gold:0.12, prism:0.15 };
const NEXT_RAR  = { normal:'gold', gold:'prism', prism:'legend' };
const RECIPE_COST = 2000;
/* 이종 합성 결과 등급: 재료 중 높은 등급을 계승하되, 낮은 확률로 더 높은 등급이 깃든다 */
const FUSE_RAR_LEGEND = 0.015, FUSE_RAR_PRISM = 0.065, FUSE_RAR_GOLD = 0.225;
function rollFuseRarity(base){
  const r = Math.random();
  let rolled = 'normal';
  if(r < FUSE_RAR_LEGEND) rolled = 'legend';
  else if(r < FUSE_RAR_PRISM) rolled = 'prism';
  else if(r < FUSE_RAR_GOLD) rolled = 'gold';
  return RARITY[rolled].rank > RARITY[base].rank ? rolled : base;
}
const FUSION_RECIPES = [
  { mats:['latte','gian'],            to:'cafegriffin' },
  { mats:['slimeking','shredgator'],  to:'dochydra' },
  { mats:['beambat','vending'],       to:'sparkmimic' },
  { mats:['americano','nightghost'],  to:'overcat' },
  /* 이세계 레시피 (2부) */
  { mats:['manaslime','golemknight'], to:'archgolem' },
  { mats:['elfintern','orcforeman'],  to:'halforc' },
  { mats:['wyvernfax','mimicdesk'],   to:'paperdragon' },
  /* 패치 보상 캐릭터 합성 */
  { mats:['leejunseok','parksangkyu'], to:'wontaebo' },
  /* 이세계 후반 레시피 */
  { mats:['stormram','ashbird'],      to:'tempestphoenix' },
  { mats:['voidcat','timewraith'],    to:'eternitycat' },
  { mats:['anglerlamp','spiritlamp'], to:'genielamp' },
  /* 신계 레시피 (3부) */
  { mats:['constellawhale','protodragon'], to:'galaxydragon' },
  { mats:['karmacat','soulsheep'],         to:'karmaphoenix' },
  { mats:['infinitymoth','gearseraph'],    to:'timelesscat' },
  /* 공허 레시피 (4부) */
  { mats:['archiveghoul','gravityleech'],  to:'oblivionwyrm' },
  { mats:['dismantlebot','silencebird'],   to:'paradoxengine' },
  { mats:['omegaslime','ideawisp'],        to:'genesisseed' },
];
function allMons(){ return [...G.party, ...G.box]; }
function removeMon(m){
  let i = G.party.indexOf(m);
  if(i>=0){ G.party.splice(i,1); if(G.active>=G.party.length) G.active=Math.max(0,G.party.length-1); return; }
  i = G.box.indexOf(m);
  if(i>=0) G.box.splice(i,1);
}
function addMon(m){
  if(G.party.length<4) G.party.push(m); else G.box.push(m);
  if(G.active>=G.party.length) G.active=0;
}
let fuseMsg = '';
function scrFusion(){
  const lines = [['― 합성 실험실 ―','bold'],'',
    ['동종 합성: 같은 종·같은 등급 2마리 → 낮은 확률로 등급 상승. 실패해도 부재료는 소멸!','dim'],
    ['이종 합성: 특정 조합 2마리 → 새로운 종 탄생 (재료 모두 소멸, 항상 성공)','dim'],''];
  if(fuseMsg){ lines.push([fuseMsg,'hl'],''); fuseMsg=''; }
  lines.push(`복지포인트: ${G.money.toLocaleString()}P`);
  const choices = [];
  /* 동종 후보 */
  const groups = {};
  for(const m of allMons()){
    const rar = m.rar||'normal';
    if(rar==='legend') continue;
    const k = m.sid+'|'+rar;
    (groups[k]=groups[k]||[]).push(m);
  }
  for(const k of Object.keys(groups)){
    const g = groups[k];
    if(g.length<2) continue;
    g.sort((a,b)=>b.lv-a.lv);
    let main = g[0];
    let sub = g.slice(1).find(x=>G.box.includes(x)) || g[1];
    /* 파티가 비지 않도록: 부재료가 파티의 마지막 1마리면 역할 교환 */
    if(G.party.length===1 && G.party[0]===sub){ const t=main; main=sub; sub=t; }
    const rar = main.rar||'normal';
    choices.push([`[동종] ${monName(main)} LV${main.lv} + LV${sub.lv} → ${RARITY[NEXT_RAR[rar]].prefix.trim()} 도전 ${Math.round(FUSE_RATE[rar]*100)}% · ${FUSE_COST[rar]}P`, ()=>{
      if(G.money<FUSE_COST[rar]){ fuseMsg='복지포인트가 부족하다…'; render(); return; }
      G.money -= FUSE_COST[rar];
      removeMon(sub);
      if(Math.random()<FUSE_RATE[rar]){
        main.rar = NEXT_RAR[rar];
        if(main.rar==='legend' && !main.trait){
          const keys = Object.keys(TRAITS);
          main.trait = keys[Math.floor(Math.random()*keys.length)];
        }
        recalcMonStats(main); main.hp = main.maxhp;
        dexCatch(main.sid, main.rar);
        fuseMsg = `✨ 합성 대성공!! ${monName(main)}(으)로 다시 태어났다!`;
      } else {
        fuseMsg = `합성 실패… 부재료가 빛이 되어 사라졌다. (${monName(main)}은(는) 무사하다)`;
      }
      render();
    }]);
  }
  /* 이종 후보 */
  for(const rc of FUSION_RECIPES){
    const a  = allMons().find(m=>m.sid===rc.mats[0]);
    const b2 = allMons().find(m=>m.sid===rc.mats[1] && m!==a);
    if(a && b2){
      choices.push([`[이종] ${SPECIES[rc.mats[0]].name} + ${SPECIES[rc.mats[1]].name} → ??? · ${RECIPE_COST}P`, ()=>{
        if(G.money<RECIPE_COST){ fuseMsg='복지포인트가 부족하다…'; render(); return; }
        G.money -= RECIPE_COST;
        const lv = Math.max(3, Math.round((a.lv+b2.lv)/2));
        const baseRar = RARITY[a.rar||'normal'].rank >= RARITY[b2.rar||'normal'].rank ? (a.rar||'normal') : (b2.rar||'normal');
        const rar = rollFuseRarity(baseRar);
        removeMon(a); removeMon(b2);
        const nm = makeMon(rc.to, lv, rar);
        addMon(nm);
        dexCatch(rc.to, rar);
        fuseMsg = `🧬 이종 합성!! 새로운 종 [${monName(nm)}]이(가) 탄생했다!!`;
        if(rar !== baseRar) fuseMsg += ` ✨ 합성 중 ${RARITY[rar].prefix.trim()} 등급이 깃들었다!!`;
        render();
      }]);
    } else if(G.dex[rc.mats[0]] && G.dex[rc.mats[1]]){
      lines.push([`레시피 발견: ${SPECIES[rc.mats[0]].name} + ${SPECIES[rc.mats[1]].name} → ??? (재료 부족)`,'dim']);
    }
  }
  if(choices.length===0) lines.push('','지금 합성 가능한 조합이 없다. (같은 종·같은 등급 2마리, 또는 레시피 재료 2마리)');
  choices.push(['돌아간다', ()=>{ G.screen='hub'; render(); }]);
  paint(lines, choices);
}

  setCell(ROWS-1,1,'1. 일반 도감으로','choice',()=>{ G.screen='dex'; render(); });
  setCell(ROWS-1,4,'2. 돌아간다','choice',()=>{ G.screen='hub'; render(); });
  setFx('=VLOOKUP("전설", 도감, 👑)');
}

    if(G.floor===16 && G.story>=17 && Math.random()<0.03) pool=['moiradirector'];
    if(G.floor===17 && G.story>=18 && Math.random()<0.03) pool=['yamamanager'];
    if(G.floor===18 && G.story>=19 && Math.random()<0.03) pool=['chronosforeman'];
    if(G.floor===19 && G.story>=20 && Math.random()<0.03) pool=['demiurgelab'];
    if(G.floor===20 && G.story>=21 && Math.random()<0.025) pool=['omniversceo'];
    /* 공허 간부: 해당 구역 보스 격파 후 그 구역에서 드물게 출현 */
    if(G.floor===21 && G.story>=22 && Math.random()<0.03) pool=['devoidchief'];
    if(G.floor===22 && G.story>=23 && Math.random()<0.03) pool=['whiteoutdir'];
    if(G.floor===23 && G.story>=24 && Math.random()<0.03) pool=['redactmaster'];
    if(G.floor===24 && G.story>=25 && Math.random()<0.03) pool=['breakerforeman'];
    if(G.floor===25 && G.story>=26 && Math.random()<0.03) pool=['liquidjudge'];
    if(G.floor===26 && G.story>=27 && Math.random()<0.025) pool=['nullchairman'];
    const sid = pool[Math.floor(Math.random()*pool.length)];
    const LEGEND_WILD_LV = { dragon:18, phoenix:24, burnoutlord:40, overgod:60,
      metatronsec:70, moiradirector:76, yamamanager:81, chronosforeman:86, demiurgelab:91, omniversceo:96,
      devoidchief:104, whiteoutdir:110, redactmaster:116, breakerforeman:122, liquidjudge:128, nullchairman:136 };

      ? (LEGEND_WILD_LV[sid]||24)
      : area.lv[0] + Math.floor(Math.random()*(area.lv[1]-area.lv[0]+1));

  } else if(roll < 0.90){
    const pickPool = G.story>=3 ? ['clip','clip','bacchus','goldclip'] : ['clip','clip','bacchus'];
    const found = pickPool[Math.floor(Math.random()*pickPool.length)];

    exploreText = [area.flavor,'',`바닥에서 ${ITEM_DEF[found].name} 1개를 주웠다!`];

  } else {
    G.screen='explore';
    exploreText = [area.flavor,'','…아무 일도 일어나지 않았다. 평화로운 직장이다.'];

}
function scrExplore(){

/* ════════════════ 전투 ════════════════ */
function pushLog(s){ G.log.push(s); if(G.log.length>9) G.log.shift(); }

function ensureAliveLead(){
  if(activeMon().hp<=0){
    const idx = G.party.findIndex(m=>m.hp>0);
    if(idx>=0) G.active = idx;
  }
}
/* 전투 시작 시 기록해 둔 선두를 전투 종료 후 되돌린다 (파티 관리에서 정한 선두 유지) */
function restoreLead(){
  const b = G.battle;
  if(b && b.lead!==undefined && b.lead<G.party.length) G.active = b.lead;
}

/* 야생 몬스터 강화: 너무 쉽게 잡히던 문제 — 일반 야생 적의 HP/공격을 보정.
   전설 야생종은 자체 스탯이 이미 높으니 소폭만. */
const WILD_HP_MULT = 1.4, WILD_ATK_MULT = 1.18;
function buffWild(enemy){
  const legendish = SPECIES[enemy.sid].legend;
  const hpM = legendish ? 1.15 : WILD_HP_MULT;
  const atkM = legendish ? 1.08 : WILD_ATK_MULT;
  enemy.maxhp = Math.round(enemy.maxhp*hpM);
  enemy.hp = enemy.maxhp;
  enemy.atk = Math.round(enemy.atk*atkM);
  return enemy;
}
function startWildBattle(enemy){
  const lead = G.active; /* 기절로 임시 교체돼도 전투 후 원래 선두로 복귀 */
  buffWild(enemy);
  battleSnapshot = JSON.stringify(G, saveReplacer);
  ensureAliveLead();
  dexSee(enemy.sid);
  G.battle = { enemy, wild:true, over:false, menu:'main', lead };
  G.log = [`야생의 ${monName(enemy)}(LV${enemy.lv})이(가) 나타났다!`];
  if(enemy.rar==='gold') G.log.push('황금빛으로 빛나고 있다…! (희귀 개체)');
  if(enemy.rar==='prism') G.log.push('공기가 일렁이며 무지갯빛으로 빛난다…!! (초희귀 개체)');
  if(enemy.rar==='legend') G.log.push(`전설로만 듣던 기운이 휘몰아친다…!! 절대 놓치지 마라! (특성: ${enemy.trait})`);
  if(SPECIES[enemy.sid].legend) G.log.push('압도적인 야근의 기운이 느껴진다…!');
  G.screen='battle'; render();
}

/* revenge: 격파한 보스 재대결 — 레벨·배율이 더 오르고 보상은 80%에서 반복마다 절반씩 체감 (최저 10%) */
const REVENGE_LV_BONUS = 8, REVENGE_MULT_BONUS = 0.2, REVENGE_REWARD_RATE = 0.8, REVENGE_REWARD_MIN = 0.1;
function revengeRate(idx){
  const n = (G.revN||{})[idx]||0;
  return Math.max(REVENGE_REWARD_MIN, REVENGE_REWARD_RATE * Math.pow(0.5, n));
}
function startBossBattle(idx, revenge){
  const lead = G.active; /* 기절로 임시 교체돼도 전투 후 원래 선두로 복귀 */
  battleSnapshot = JSON.stringify(G, saveReplacer);
  ensureAliveLead();
  if(aliveMons().length===0){ pendingMsg.push('싸울 수 있는 몬스터가 없다. 먼저 회복하자.'); render(); return; }
  const B = BOSSES[idx];
  const mult = (B.mult||1) + (revenge ? REVENGE_MULT_BONUS : 0);
  const party = B.party.map(([sid,lv])=>{
    const m = makeMon(sid, lv + (revenge ? REVENGE_LV_BONUS : 0));
    m.maxhp = Math.round(m.maxhp*mult); m.hp = m.maxhp; m.atk = Math.round(m.atk*mult);
    return m;
  });
  party.forEach(m=>dexSee(m.sid));
  G.battle = { enemyParty:party, eIdx:0, enemy:party[0], wild:false, bossIdx:idx, revenge:!!revenge, over:false, menu:'main', lead };
  G.log = [B.pre, `${B.name}이(가) ${monName(party[0])}을(를) 내보냈다!`];
  if(revenge) G.log.unshift('〔재대결 — 강화판〕 상대가 훨씬 강해져서 돌아왔다!');
  G.screen='battle'; render();
}

function dmgCalc(attacker, power, moveType, defender){
  const mult = moveType ? typeMult(moveType, monType(defender)) : 1;
  const critRate = attacker.trait==='집중' ? 0.20 : 0.08;
  const crit = Math.random()<critRate ? 1.5 : 1;
  let base = attacker.atk * power/40 * mult * crit * (0.85+Math.random()*0.3);
  if(defender.trait==='강철') base *= 0.8;
  return { val: Math.max(1, Math.round(base)), mult, crit: crit>1 };
}
/* 레전드 패시브 (행동 직후 발동) */
function applyTraits(actor, dealt){
  if(actor.hp<=0) return;
  if(actor.trait==='흡혈' && dealt>0 && actor.hp<actor.maxhp){
    const heal = Math.min(actor.maxhp-actor.hp, Math.max(1,Math.round(dealt*0.25)));
    actor.hp += heal;
    pushLog(`${monName(actor)}의 [흡혈] 발동! HP ${heal} 회복`);
  }
  if(actor.trait==='재생' && actor.hp<actor.maxhp){
    const heal = Math.min(actor.maxhp-actor.hp, Math.max(1,Math.round(actor.maxhp*0.06)));
    actor.hp += heal;
    pushLog(`${monName(actor)}의 [재생] 발동! HP ${heal} 회복`);
  }
}
function fxTag(mult, crit){
  let s='';
  if(crit) s+=' 급소!';
  if(mult>1) s+=' (효과 굉장!)'; else if(mult<1) s+=' (효과 별로…)';
  return s;
}

/* 적 AI: 상성·위력 기대값이 높은 기술 선택. 보스는 항상, 야생은 35% 확률로 똑똑하게 */
function pickEnemyMove(e, target, smart){
  const mvs = knownMoves(e);
  if(!smart) return mvs[Math.floor(Math.random()*mvs.length)];
  let best = mvs[0], bestScore = -1;
  for(const mv of mvs){
    const score = mv[2] * (mv[3] ? typeMult(mv[3], monType(target)) : 1);
    if(score > bestScore){ bestScore = score; best = mv; }
  }
  return best;
}
function enemyTurn(){
  const b=G.battle; if(b.over) return;
  const e=b.enemy, me=activeMon();
  if(e.hp<=0) return;
  const mv = pickEnemyMove(e, me, !b.wild || Math.random() < (G.floor>=6 ? 0.8 : 0.5));
  const {val,mult,crit} = dmgCalc(e, mv[2], mv[3], me);
  me.hp = Math.max(0, me.hp - val);
  pushLog(`${monName(e)}의 ${mv[1]}! ${val} 데미지${fxTag(mult,crit)}`);
  applyTraits(e, val);
  if(me.hp<=0){
    pushLog(`${monName(me)}이(가) 기절했다!`);
    if(aliveMons().length===0){
      b.over=true;
      pushLog('더 싸울 몬스터가 없다… 눈앞이 깜깜해졌다.');
      /* 패배 페널티는 화면 전환 시점에 1회만 적용 (재렌더 중복 차감 방지) */
      G.streak = 0;
      G.money = Math.max(0, G.money - Math.floor(G.money*0.2));
      setTimeout(()=>{ G.screen='gameover'; render(); },40);
    } else {
      b.menu='forceSwitch';
    }
  }
}

const EXP_SHARE_RATE = 0.3; /* 선두 외 파티원이 받는 경험치 비율 */
const MUT_PITY = 3;         /* 돌연변이 천장: 같은 종 진화 N회 실패 시 다음은 확정 */
function gainExp(mon, exp){
  mon.exp += exp;
  while(mon.exp >= expNeed(mon.lv)){
    mon.exp -= expNeed(mon.lv);
    mon.lv++;
    const before = knownMoves(mon).map(m=>m[1]);
    const dope = mon.dope||1;
    const st = statsFor(mon.sid, mon.lv, mon.rar);
    const newMax = Math.round(st.maxhp*dope);
    const gain = Math.max(0, newMax - mon.maxhp);
    mon.maxhp = newMax; mon.atk = Math.round(st.atk*dope);
    mon.hp = mon.hp<=0 ? 0 : Math.min(mon.maxhp, mon.hp+gain);
    pushLog(`${monName(mon)} 레벨 업! → LV${mon.lv}`);
    const evo = SPECIES[mon.sid].evo;
    if(evo && mon.lv>=evo.lv){
      const oldName = monName(mon);
      /* 돌연변이: 진화 순간 낮은 확률 — 단, MUT_PITY회 실패가 쌓이면 확정 발동 */
      let mutated = false;
      if(evo.mut){
        G.mutFail = G.mutFail||{};
        mutated = (G.mutFail[mon.sid]||0) >= MUT_PITY || Math.random()<evo.mut.p;
        G.mutFail[mon.sid] = mutated ? 0 : (G.mutFail[mon.sid]||0)+1;
      }
      mon.sid = mutated ? evo.mut.to : evo.to;
      const st2 = statsFor(mon.sid, mon.lv, mon.rar);
      const ratio = mon.maxhp>0 ? mon.hp/mon.maxhp : 1;
      mon.maxhp = Math.round(st2.maxhp*dope); mon.atk = Math.round(st2.atk*dope);
      mon.hp = mon.hp<=0 ? 0 : Math.max(1, Math.round(mon.maxhp*ratio));
      if(mutated) pushLog(`!!! 돌연변이 진화 !!! ${oldName}이(가) 특별한 개체 ${monName(mon)}(으)로 다시 태어났다!!`);
      else pushLog(`!! ${oldName}이(가) ${monName(mon)}(으)로 진화했다 !!`);
      dexCatch(mon.sid, mon.rar);
    }
    const after = knownMoves(mon).map(m=>m[1]);
    after.filter(n=>!before.includes(n)).forEach(n=>pushLog(`새 기술 [${n}]을(를) 배웠다!`));
  }
}
/* 레벨 차이 경험치 페널티: 내 선두가 적보다 높을수록 경험치 급감 (저레벨 사냥 비효율화) */
function expLevelFactor(myLv, enemyLv){
  const gap = myLv - enemyLv;
  if(gap <= 2) return 1;                       /* 동레벨~약간 높음: 패널티 없음 */
  return Math.max(0.12, 1 - (gap-2)*0.08);     /* 3레벨 차부터 8%씩 감소, 최저 12% */
}
function grantExpAndMoney(e, moneyMult){
  const me = activeMon();
  const factor = expLevelFactor(me.lv, e.lv);
  const exp = Math.max(1, Math.round(e.lv*13*factor));
  const pay = Math.round(e.lv*15*RARITY[e.rar||'normal'].pay*(moneyMult||1)*streakMult());
  G.money += pay;
  pushLog(`경험치 ${exp}${factor<1?' (레벨 차 ↓)':''}, 복지포인트 ${pay}P 획득!`);
  gainExp(me, exp);
  /* 경험치 공유: 나머지 파티원도 일부를 받는다 (육성 그라인딩 완화) */
  G.party.forEach(m=>{ if(m!==me) gainExp(m, Math.max(1, Math.round(exp*EXP_SHARE_RATE))); });
}

function countCoolerWin(){
  if(G.coolerCd>0){
    G.coolerCd--;
    if(G.coolerCd===0) pushLog(`🚰 ${coolerName()}이(가) 다시 차올랐다! 무료 회복을 쓸 수 있다.`);
  }
}
/* 연승 스트릭: 이길수록 복지포인트 보너스 (+3%/승, 최대 +30%). 패배하면 초기화 */
function streakMult(){ return 1 + Math.min(G.streak||0, 10)*0.03; }
function countStreakWin(){
  G.streak = (G.streak||0) + 1;
  if(G.streak>=5 && G.streak%5===0) pushLog(`🔥 ${G.streak}연승!! 승리 보상 +${Math.min(G.streak,10)*3}% 적용 중`);
}
function winWild(){
  const b=G.battle; b.over=true; G.wins++; countCoolerWin(); countStreakWin();
  pushLog(`${monName(b.enemy)}을(를) 쓰러뜨렸다!`);
  grantExpAndMoney(b.enemy, 1);
  if(Math.random()<0.4){
    const drop = Math.random()<0.6?'clip':'bacchus';
    G.items[drop]++;
    pushLog(`${ITEM_DEF[drop].name} 1개를 주웠다!`);
  }
  if(Math.random()<HAIR_DROP_RATE){
    G.items.hair++;
    pushLog(`💇 [의문의 머리카락]을(를) 주웠다! (${G.items.hair}/${HAIR_REQUIRED}) …누구의 것일까?`);
  }
}

function onTrainerMonDown(){
  const b=G.battle, B=BOSSES[b.bossIdx];
  pushLog(`${monName(b.enemy)}을(를) 쓰러뜨렸다!`);
  grantExpAndMoney(b.enemy, 1.3);
  b.eIdx++;
  if(b.eIdx < b.enemyParty.length){
    b.enemy = b.enemyParty[b.eIdx];
    pushLog(`${B.name}이(가) ${monName(b.enemy)}을(를) 내보냈다!`);
  } else {
    b.over=true; G.wins++; countCoolerWin(); countStreakWin();
    const reward = Math.round(B.reward * (b.revenge ? revengeRate(b.bossIdx) : 1));
    if(b.revenge){ G.revN = G.revN||{}; G.revN[b.bossIdx] = (G.revN[b.bossIdx]||0)+1; }
    G.money += reward;
    pushLog(`★ ${B.name}에게 승리! 보상 ${reward.toLocaleString()}P!${b.revenge?' (재대결 반복 시 보상 체감)':''}`);
    if(!canAutoSave) pushLog('💾 큰 진행을 했다! [백업 코드]를 발급해 보관해 두자.');
    if(!b.revenge && b.bossIdx===G.story){
      G.story++;
      if(G.story===5 || G.story===6 || G.story===11 || G.story===15 || G.story===21 || G.story===27){ setTimeout(()=>{ G.screen='ending'; render(); },40); return; }
      b.afterStory = true;
    }
  }
}

function playerMove(mvIdx){
  const b=G.battle; if(b.over) return;
  const me=activeMon(), e=b.enemy;
  if(me.hp<=0){ b.menu='forceSwitch'; render(); return; }
  const mv = knownMoves(me)[mvIdx];
  const {val,mult,crit} = dmgCalc(me, mv[2], mv[3], e);
  e.hp = Math.max(0, e.hp - val);
  pushLog(`${monName(me)}의 ${mv[1]}! ${val} 데미지${fxTag(mult,crit)}`);
  applyTraits(me, val);
  /* 주의: enemyTurn()이 menu를 forceSwitch로 바꿀 수 있으므로 main 초기화는 반드시 그 전에 */
  b.menu='main';
  if(e.hp<=0){
    if(b.wild) winWild(); else onTrainerMonDown();
  } else enemyTurn();
  render();
}

const CLIP_MULT = { clip:1, goldclip:1.6, prismclip:2.4, dimclip:4, godclip:6 };
function throwClip(key){
  const b=G.battle; if(b.over||!b.wild) return;
  if(typeof key!=='string') key = key?'goldclip':'clip'; /* 구버전 호출(boolean) 호환 */
  if(G.items[key]<=0){ pushLog(`${ITEM_DEF[key].name}이(가) 없다!`); render(); return; }
  G.items[key]--;
  const e=b.enemy;
  let chance = (0.22 + 0.65*(1 - e.hp/e.maxhp)) * CLIP_MULT[key];
  chance *= RARITY[e.rar||'normal'].catch;
  if(SPECIES[e.sid].legend) chance *= 0.45;
  b.menu='main';
  if(Math.random()<chance){
    pushLog(`클립이 ${monName(e)}을(를) 집었다! 포획 성공!!`);
    /* 야생 강화 배율을 제거하고 정상 스탯으로 복원 (강화분이 따라붙지 않도록) */
    recalcMonStats(e);
    e.hp = Math.max(1, e.hp);
    if(G.party.length<4){ G.party.push(e); pushLog('파티에 합류했다.'); }
    else { G.box.push(e); pushLog('파티가 가득 차서 보관함으로 이동했다.'); }
    dexCatch(e.sid, e.rar);
    if(e.trait) pushLog(`특성 [${e.trait}] — ${TRAITS[e.trait]}`);
    if(!canAutoSave && RARITY[e.rar||'normal'].rank>=2) pushLog('💾 희귀 개체 획득! 잃기 전에 [백업 코드]를 발급해 두자.');
    b.over=true;
  } else {
    pushLog(`아깝다! ${monName(e)}이(가) 클립을 튕겨냈다!`);
    enemyTurn();
  }
  render();
}

function useHeal(kind){
  const b=G.battle; if(b.over) return;
  const me=activeMon();
  if(me.hp<=0){ b.menu='forceSwitch'; render(); return; }
  if(G.items[kind]<=0){ pushLog('아이템이 없다!'); render(); return; }
  if(me.hp>=me.maxhp){ pushLog('HP가 이미 가득하다!'); render(); return; }
  G.items[kind]--;
  if(kind==='bacchus'){
    /* 고정 35는 후반에 무의미 — 최대 HP 비율 회복으로 (최소 35 보장) */
    const heal = Math.max(35, Math.round(me.maxhp*0.35));
    me.hp=Math.min(me.maxhp, me.hp+heal); pushLog(`${monName(me)} HP ${heal} 회복!`);
  }
  else { me.hp=me.maxhp; pushLog(`${monName(me)} HP 완전 회복!`); }
  b.menu='main'; enemyTurn(); render();
}

function tryRun(){
  const b=G.battle; if(b.over) return;
  if(!b.wild){ pushLog('보스 앞에서 도망칠 수는 없다…!'); render(); return; }
  b.menu='main';
  if(Math.random()<0.7){ pushLog('무사히 도망쳤다!'); b.over=true; }
  else { pushLog('도망칠 수 없었다!'); enemyTurn(); }
  render();
}

function switchMon(i, free){
  const b=G.battle;
  if(G.party[i].hp<=0 || i===G.active) return;
  G.active=i;
  pushLog(`가라, ${monName(G.party[i])}!`);
  b.menu='main';
  if(!free && !b.over) enemyTurn();
  render();
}

function scrBattle(){
  setStatus('계산 중...');
  const b=G.battle, e=b.enemy, me=activeMon();
  /* 선두가 기절 상태로 메인 메뉴에 머무는 일이 없도록 (구버전 저장 데이터 복구 겸) */
  if(!b.over && me.hp<=0 && aliveMons().length>0) b.menu='forceSwitch';
  const bossLabel = b.wild ? '' : ` 〔${BOSSES[b.bossIdx].name} ${b.eIdx+1}/${b.enemyParty.length}〕`;
  const lines = [
    [`⚔ ${monName(e)}  LV${e.lv}  [${monType(e)}]${bossLabel}`, monCls(e)||'bold'],
    [`   HP ${e.hp}/${e.maxhp}  ${'█'.repeat(Math.ceil(e.hp/e.maxhp*10)).padEnd(10,'░')}`, e.hp<e.maxhp*0.3?'hl':''],
    [`▼ ${monName(me)}  LV${me.lv}  [${monType(me)}]`, monCls(me)||'bold'],
    [`   HP ${me.hp}/${me.maxhp}  ${'█'.repeat(Math.ceil(Math.max(0,me.hp)/me.maxhp*10)).padEnd(10,'░')}  ·  EXP ${expBar(me,10)} ${expPct(me)}%`, me.hp<me.maxhp*0.3?'hl':''],
    '',
    ...G.log,
    '',
  ];
  let choices = [];
  if(b.over){
    const next = b.afterStory
      ? ()=>{ restoreLead(); pendingMsg.push(BOSSES[b.bossIdx].win); G.screen='storyBeat'; storyBeatNext='hub'; render(); }
      : ()=>{ restoreLead(); G.screen='hub'; render(); };
    if(aliveMons().length>0) choices=[['전투 종료 — 돌아간다', next]];
  } else if(b.menu==='forceSwitch'){
    G.party.forEach((m,i)=>{ if(m.hp>0) choices.push([`${monName(m)} 교체 투입 (HP ${m.hp})`, ()=>switchMon(i,true)]); });
  } else if(b.menu==='moves'){
    knownMoves(me).forEach((mv,i)=>{
      /* 예상 데미지에 상성까지 반영 — 표시값과 실제값이 어긋나지 않도록 */
      const mult = mv[3] ? typeMult(mv[3], monType(e)) : 1;
      const est = Math.max(1, Math.round(me.atk*mv[2]/40*mult));
      const mark = mult>1 ? ' ▲굉장' : mult<1 ? ' ▼별로' : '';
      choices.push([`${mv[1]} (위력 ${mv[2]}${mv[3]?', '+mv[3]:''} · 예상 ${est}±${mark})`, ()=>playerMove(i)]);
    });
    choices.push(['← 뒤로', ()=>{ b.menu='main'; render(); }]);
  } else if(b.menu==='bag'){
    if(b.wild){
      for(const ck of Object.keys(CLIP_MULT)){
        if(ck==='clip' || G.items[ck]>0)
          choices.push([`${ITEM_DEF[ck].name} 던지기 (${G.items[ck]})`, ()=>throwClip(ck)]);
      }
    }
    choices.push([`박카스 — HP 35 (${G.items.bacchus})`, ()=>useHeal('bacchus')]);
    if(G.items.hotsix>0) choices.push([`핫식스 — 완전 회복 (${G.items.hotsix})`, ()=>useHeal('hotsix')]);
    choices.push(['← 뒤로', ()=>{ b.menu='main'; render(); }]);
  } else if(b.menu==='switch'){
    G.party.forEach((m,i)=>{
      if(i!==G.active && m.hp>0) choices.push([`${monName(m)} (HP ${m.hp}/${m.maxhp})`, ()=>switchMon(i,false)]);
    });
    choices.push(['← 뒤로', ()=>{ b.menu='main'; render(); }]);
  } else {
    choices = [
      ['공격한다', ()=>{ b.menu='moves'; render(); }],
      ['가방 (포획/회복)', ()=>{ b.menu='bag'; render(); }],
    ];
    if(G.party.filter((m,i)=>i!==G.active&&m.hp>0).length>0)
      choices.push(['교체한다', ()=>{ b.menu='switch'; render(); }]);
    choices.push([b.wild?'도망간다':'도망갈 수 없다…', tryRun]);
  }
  paint(lines, choices, `=BATTLE("${monName(e)}", ${e.hp})`);
}

/* v2(황금 boolean) 백업 코드 → v3(rar 등급) 변환 */
function migrateSave(obj){
  if(obj.v===2){
    for(const m of [...(obj.party||[]), ...(obj.box||[])]){
      m.rar = m.gold ? 'gold' : 'normal';
      delete m.gold;
    }
    obj.rarDex = {};
    for(const sid of Object.keys(obj.goldDex||{})) obj.rarDex[sid]='gold';
    delete obj.goldDex;
    obj.battle = null;
    if(obj.screen==='battle') obj.screen='hub';
    obj.v = 3;
  }
  if(!obj.rarDex) obj.rarDex = {};
  if(!obj.dex) obj.dex = {};
  if(!Array.isArray(obj.dexRewards)) obj.dexRewards = [];
  if(!Array.isArray(obj.box)) obj.box = [];
  if(!Array.isArray(obj.log)) obj.log = [];
  if(!obj.items) obj.items = {};
  if(typeof obj.money!=='number' || !isFinite(obj.money)) obj.money = 0;
  if(obj.name) obj.name = sanitizeName(obj.name) || ('사원'+Math.floor(Math.random()*900+100));
  if(!obj.revN) obj.revN = {};
  if(!obj.mutFail) obj.mutFail = {};
  if(!obj.coolerCd) obj.coolerCd = 0;
  if(obj.items && obj.items.ample===undefined) obj.items.ample = 0;
  if(obj.items && obj.items.prismclip===undefined) obj.items.prismclip = 0;
  if(obj.items && obj.items.dimclip===undefined) obj.items.dimclip = 0;
  if(obj.items && obj.items.godclip===undefined) obj.items.godclip = 0;
  if(obj.items && obj.items.elixir===undefined) obj.items.elixir = 0;
  if(obj.items && obj.items.detox===undefined) obj.items.detox = 0;
  if(obj.items && obj.items.hair===undefined) obj.items.hair = 0;
  if(typeof obj.streak!=='number') obj.streak = 0;
  if(obj.isekai===undefined) obj.isekai = false;
  if(!obj.gifts) obj.gifts = {};
  if(!obj.pid) obj.pid = makePid();
  if(typeof obj.playMs!=='number') obj.playMs = 0;
  /* v4: HP 성장 곡선 변경 — 저장된 모든 개체의 스탯을 새 공식으로 재계산 */
  if(obj.v!==4){
    for(const mon of [...(obj.party||[]), ...(obj.box||[])]){
      if(!SPECIES[mon.sid]) continue;
      const ratio = mon.maxhp>0 ? mon.hp/mon.maxhp : 1;
      const st = statsFor(mon.sid, mon.lv, mon.rar);
      const dope = mon.dope||1;
      mon.maxhp = Math.max(1, Math.round(st.maxhp*dope));
      mon.atk = Math.max(1, Math.round(st.atk*dope));
      mon.hp = mon.hp<=0 ? 0 : Math.max(1, Math.round(mon.maxhp*ratio));
    }
    obj.v = 4;
  }
  return obj;
}
function decodeSave(code){
  const obj = JSON.parse(decodeURIComponent(escape(atob(code.trim()))));
  if(!obj || (obj.v!==2 && obj.v!==3 && obj.v!==4) || !Array.isArray(obj.party)) throw new Error('bad');
  if(!obj.name) obj.name = '사원'+Math.floor(Math.random()*900+100);
  return migrateSave(obj);
}

  }
  for(const k in fakeEdits){
    if(painted.has(k)) continue;
    const [r,c] = k.split(',').map(Number);
    setCell(r, c, fakeEdits[k]);
  }
  sheetEl.querySelectorAll('td').forEach(td=>{ td.contentEditable = 'true'; });
}

/* 위장 시트 셀 편집: 입력 즉시 저장, Enter = 편집 종료 (엑셀처럼) */
sheetEl.querySelectorAll('td').forEach(td=>{
  td.addEventListener('input', ()=>{
    if(!bossMode) return;
    fakeEdits[td.dataset.r+','+td.dataset.c] = td.textContent;
    saveFakeEdits();
  });
  td.addEventListener('keydown', e=>{
    if(bossMode && e.key==='Enter'){ e.preventDefault(); td.blur(); }
  });
});

document.addEventListener('keydown', e=>{
  if(e.key==='Escape'){
    if(dlg.classList.contains('show')){ closeDlg(); return; }
    bossMode=!bossMode; render(); return;
  }
  if(dlg.classList.contains('show')) return;
  if(!bossMode){
    const ki = CHOICE_KEYS.indexOf(e.key.toLowerCase());
    if(ki>=0){
      const tds=[...sheetEl.querySelectorAll('td.choice')];
      if(tds[ki]) tds[ki].click();
    }
  }
});

/* 부팅: 로컬 캐시가 있으면 타이틀 없이 즉시 이어서 실행 */
function bootLoad(){
  localLoadCheck();
  if(!hasCloud && cloudSaveData){ resumeSave(cloudSaveData); return; }
  render();
}
bootLoad();
cloudLoadCheck();
</script>
</body>
</html>
